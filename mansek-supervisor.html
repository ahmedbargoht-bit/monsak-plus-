<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>المشرف بلس | الطحان للتمور</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --navy:#1a2744;
  --navy2:#243258;
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --red:#c0392b;
  --green:#1a7a4a;
  --orange:#e65100;
  --bg:#f4f6fb;
  --card:#fff;
  --border:#e8ecf5;
  --text:#1a2744;
  --text2:#6b7a99;
  --radius:14px;
  --shadow:0 2px 16px rgba(26,39,68,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Login ── */
#s-login{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#2d4a8a 100%);
  padding:20px}
.login-box{background:#fff;border-radius:24px;padding:40px 32px;width:min(400px,100%);
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.login-title{font-size:22px;font-weight:900;color:var(--navy);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:28px}
.fld{margin-bottom:16px}
.lbl{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Cairo',sans-serif;outline:none;transition:.2s}
.inp:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,39,68,.08)}
.btn-login{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;font-family:'Cairo',sans-serif;
  cursor:pointer;transition:.2s}
.btn-login:hover{background:var(--navy2)}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none}

/* ── App ── */
#s-app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--navy);color:#fff;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:16px;font-weight:700}
.topbar-sup{font-size:12px;opacity:.8;margin-top:2px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn-icon{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;
  border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* ── Tabs ── */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:99;overflow-x:auto}
.tab{flex:1;min-width:70px;padding:12px 8px;text-align:center;font-size:11px;font-weight:600;
  color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.2s}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab i{display:block;font-size:18px;margin-bottom:2px}

/* ── Content ── */
.content{padding:16px;flex:1}
.screen{display:none}
.screen.active{display:block}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.card-title i{color:var(--gold)}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
.stat-n{font-size:24px;font-weight:900;color:var(--navy)}
.stat-l{font-size:10px;color:var(--text2);margin-top:2px}

/* ── Leaderboard ── */
.leader-item{display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:10px;margin-bottom:8px;background:#f8f9fd;transition:.2s;cursor:pointer}
.leader-item:hover{background:#eef1f9}
.leader-rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0}
.rank-1{background:#FFD700;color:#7a5800}
.rank-2{background:#C0C0C0;color:#555}
.rank-3{background:#CD7F32;color:#fff}
.rank-other{background:var(--border);color:var(--text2)}
.leader-info{flex:1;min-width:0}
.leader-name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leader-route{font-size:11px;color:var(--text2)}
.leader-pts{font-size:16px;font-weight:900;color:var(--navy);text-align:left}
.leader-bar-wrap{height:4px;background:var(--border);border-radius:999px;margin-top:4px;overflow:hidden}
.leader-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--navy),var(--gold));transition:width .5s}

/* ── Visits Table ── */
.visit-row{padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.visit-row-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.visit-rep{font-size:13px;font-weight:700}
.visit-branch{font-size:11px;color:var(--text2);margin-top:2px}
.visit-pts{font-size:18px;font-weight:900;color:var(--navy)}
.visit-meta{font-size:10px;color:var(--text2)}
.pts-actions{display:flex;gap:6px;margin-top:8px}
.btn-pts{padding:5px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;
  font-family:'Cairo',sans-serif;cursor:pointer}
.btn-edit{background:#E3F2FD;color:#1565C0}
.btn-del{background:#FFEBEE;color:var(--red)}
.adjusted-badge{font-size:10px;color:var(--orange);margin-top:4px}

/* ── Logs ── */
.log-item{padding:10px 12px;border-radius:8px;margin-bottom:6px;
  background:#fff;border:1px solid var(--border);font-size:12px}
.log-action-edit{border-right:3px solid #1565C0}
.log-action-delete{border-right:3px solid var(--red)}
.log-header{display:flex;justify-content:space-between;margin-bottom:4px}
.log-sup{font-weight:700}
.log-time{color:var(--text2);font-size:10px}
.log-reason{color:var(--text2);font-style:italic}

/* ── Filter ── */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-select{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;
  font-size:12px;font-family:'Cairo',sans-serif;outline:none;background:#fff;flex:1;min-width:120px}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:999;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:500px;
  max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;text-align:center}
.modal-inp{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:'Cairo',sans-serif;outline:none;margin-bottom:10px}
.modal-inp:focus{border-color:var(--navy)}
.modal-textarea{min-height:80px;resize:vertical}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn-modal{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;
  font-family:'Cairo',sans-serif;cursor:pointer}
.btn-cancel{background:var(--border);color:var(--text)}
.btn-confirm{background:var(--navy);color:#fff}
.btn-confirm-red{background:var(--red);color:#fff}
.modal-err{color:var(--red);font-size:12px;text-align:center;display:none;margin-bottom:8px}

/* ── Loading ── */
.loading{text-align:center;padding:2rem;color:var(--text2);font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);
  border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty ── */
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:13px}

/* ── Attendance ── */
.att-row{display:flex;align-items:center;gap:10px;padding:10px;
  border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.att-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.att-dot.in{background:var(--green)}
.att-dot.out{background:var(--red)}
.att-dot.none{background:#ddd}
.att-info{flex:1}
.att-name{font-size:13px;font-weight:700}
.att-time{font-size:11px;color:var(--text2)}

/* ── Badge ── */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.b-green{background:#E8F5E9;color:var(--green)}
.b-red{background:#FFEBEE;color:var(--red)}
.b-blue{background:#E3F2FD;color:#1565C0}
.b-orange{background:#FFF3E0;color:var(--orange)}
.b-gray{background:#f5f5f5;color:#666}
</style>
</head>
<body>

<!-- ══ Login ══════════════════════════════════════════════════ -->
<div id="s-login">
  <div class="login-box">
    <div class="login-logo">
      <div style="width:80px;height:80px;border-radius:50%;background:var(--navy);
        display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:32px">👔</div>
    </div>
    <div class="login-title">المشرف بلس</div>
    <div class="login-sub">الطحان للتمور — نظام إشراف المنسقين</div>
    <div class="fld">
      <label class="lbl">اسم المشرف</label>
      <select id="l-sup" class="inp" onchange="onSupChange()">
        <option value="">اختر اسمك...</option>
      </select>
    </div>
    <div class="fld">
      <label class="lbl">الباسورد</label>
      <input type="password" id="l-pass" class="inp" placeholder="أدخل الباسورد"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" onclick="doLogin()">
      <i class="ti ti-login"></i> دخول
    </button>
    <div class="login-err" id="l-err">اسم المشرف أو الباسورد غلط</div>
  </div>
</div>

<!-- ══ App ════════════════════════════════════════════════════ -->
<div id="s-app" style="display:none;flex-direction:column;min-height:100vh">
  <!-- Topbar -->
  <div class="topbar">
    <div>
      <div class="topbar-title">المشرف بلس 👔</div>
      <div class="topbar-sup" id="top-sup-name"></div>
    </div>
    <div class="topbar-actions">
      <button class="btn-icon" onclick="refreshData()" title="تحديث"><i class="ti ti-refresh"></i></button>
      <button class="btn-icon" onclick="logout()" title="خروج"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('dashboard')" id="tab-dashboard">
      <i class="ti ti-dashboard"></i>الرئيسية
    </div>
    <div class="tab" onclick="showTab('leaderboard')" id="tab-leaderboard">
      <i class="ti ti-trophy"></i>الصدارة
    </div>
    <div class="tab" onclick="showTab('visits')" id="tab-visits">
      <i class="ti ti-map-pin"></i>الزيارات
    </div>
    <div class="tab" onclick="showTab('attendance')" id="tab-attendance">
      <i class="ti ti-clock"></i>الحضور
    </div>
    <div class="tab" onclick="showTab('logs')" id="tab-logs">
      <i class="ti ti-history"></i>السجل
    </div>
    <div class="tab" onclick="showTab('plan')" id="tab-plan">
      <i class="ti ti-calendar-week"></i>الخطة
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Dashboard -->
    <div class="screen active" id="screen-dashboard">
      <div id="dash-loading" class="loading"><div class="spinner"></div><br>جاري التحميل...</div>
      <div id="dash-content" style="display:none">
        <div class="stats-grid" id="dash-stats"></div>
        <div class="card">
          <div class="card-title"><i class="ti ti-trending-up"></i> أداء اليوم</div>
          <div id="dash-perf"></div>
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-activity"></i> آخر الأنشطة</div>
          <div id="dash-activity"></div>
        </div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="screen" id="screen-leaderboard">
      <div class="filter-row">
        <select class="filter-select" id="lb-period" onchange="renderLeaderboard()">
          <option value="today">اليوم</option>
          <option value="week">هذا الأسبوع</option>
          <option value="month">هذا الشهر</option>
          <option value="all">الكل</option>
        </select>
      </div>
      <div id="lb-list" class="loading"><div class="spinner"></div><br>جاري التحميل...</div>
    </div>

    <!-- Visits -->
    <div class="screen" id="screen-visits">
      <div class="filter-row">
        <input type="date" class="filter-select" id="v-date" onchange="renderVisits()"/>
        <select class="filter-select" id="v-rep" onchange="renderVisits()">
          <option value="all">كل المنسقين</option>
        </select>
      </div>
      <div id="visits-list"></div>
    </div>

    <!-- Attendance -->
    <div class="screen" id="screen-attendance">
      <div class="filter-row">
        <input type="date" class="filter-select" id="att-date" onchange="renderAttendance()"/>
      </div>
      <div id="att-list"></div>
    </div>

    <!-- Logs -->
    <div class="screen" id="screen-logs">
      <div class="card" style="background:#FFF3E0;border:1px solid #FFE0B2">
        <div style="font-size:12px;color:var(--orange)">
          <i class="ti ti-info-circle"></i>
          سجل كل العمليات التي قمت بها على نقاط المنسقين
        </div>
      </div>
      <div id="logs-list"></div>
    </div>

    <!-- Weekly Plan -->
    <div class="screen" id="screen-plan">
      <!-- إنشاء خطة جديدة أو عرض الحالية -->
      <div id="plan-header" class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div class="card-title" style="margin-bottom:0"><i class="ti ti-calendar-week"></i> خطة الأسبوع</div>
          <button onclick="createNewPlan()" id="btn-new-plan" 
            style="background:var(--navy);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-family:Cairo,sans-serif;cursor:pointer">
            + خطة جديدة
          </button>
        </div>
        <div id="plan-status-bar"></div>
      </div>

      <!-- أيام الأسبوع -->
      <div id="plan-days"></div>

      <!-- زر الاعتماد -->
      <div id="plan-approve-wrap" style="display:none;margin-top:12px">
        <button onclick="approvePlan()" 
          style="width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;
          font-size:15px;font-weight:700;font-family:Cairo,sans-serif;cursor:pointer">
          <i class="ti ti-check"></i> اعتماد الخطة وتفعيل الأسبوع
        </button>
      </div>

      <!-- نسبة الإنجاز -->
      <div id="plan-execution" style="display:none" class="card">
        <div class="card-title"><i class="ti ti-chart-bar"></i> نسبة التنفيذ</div>
        <div id="plan-exec-content"></div>
      </div>
    </div>

  </div>
</div>

<!-- ══ Modal: تعديل/حذف نقاط ══════════════════════════════════ -->
<div class="modal-overlay" id="modal-pts">
  <div class="modal-sheet">
    <div class="modal-title" id="modal-pts-title">تعديل النقاط</div>
    <div id="modal-pts-info" style="font-size:12px;color:var(--text2);text-align:center;margin-bottom:12px"></div>
    <input type="number" class="modal-inp" id="modal-pts-val" placeholder="النقاط الجديدة" min="0" max="100"/>
    <textarea class="modal-inp modal-textarea" id="modal-pts-reason"
      placeholder="سبب التعديل/الحذف (إجباري — 10 أحرف على الأقل)"></textarea>
    <div class="modal-err" id="modal-pts-err"></div>
    <div class="modal-btns">
      <button class="btn-modal btn-cancel" onclick="closePtsModal()">إلغاء</button>
      <button class="btn-modal btn-confirm" id="modal-pts-btn" onclick="confirmPtsAction()">تأكيد</button>
    </div>
  </div>
</div>

<!-- ══ Modal: إضافة زيارة للخطة ══════════════════════════════ -->
<div class="modal-overlay" id="modal-plan-item">
  <div class="modal-sheet">
    <div class="modal-title">إضافة زيارة للخطة</div>
    <div id="modal-plan-day" style="font-size:12px;color:var(--text2);text-align:center;margin-bottom:12px"></div>
    <select class="modal-inp" id="pi-rep" onchange="onPiRepChange()">
      <option value="">اختر المنسق...</option>
    </select>
    <select class="modal-inp" id="pi-route" onchange="onPiRouteChange()" style="display:none">
      <option value="">اختر خط السير...</option>
    </select>
    <select class="modal-inp" id="pi-branch">
      <option value="">اختر الفرع...</option>
    </select>
    <input type="text" class="modal-inp" id="pi-goal" placeholder="الهدف من الزيارة (اختياري)"/>
    <div class="modal-btns">
      <button class="btn-modal btn-cancel" onclick="closePlanItemModal()">إلغاء</button>
      <button class="btn-modal btn-confirm" onclick="addPlanItem()">إضافة</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://tneeosrbxedexsrigapg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1MSr3avIfgV5chBV7gn2Pw_iqIrMFIp';

const GROUPS = {
  giza:    {label:'🔵 مجموعة الجيزة',     color:'#005CBF'},
  cairo:   {label:'🟢 وسط القاهرة',        color:'#1A7A4A'},
  south:   {label:'🔴 جنوب وشرق القاهرة', color:'#D62828'},
  tajmuat: {label:'🟡 مجموعة التجمعات',   color:'#F77F00'},
  hyper:   {label:'🟣 الهايبر ماركت',      color:'#6A0DAD'},
  alex:    {label:'🌊 الإسكندرية',         color:'#0097A7'},
};

// ── State ──
let cu = null; // current supervisor
let SUPERVISORS = [];
let cachedVisits = [];
let cachedAttendance = [];
let cachedLogs = [];
let repNames = [];
let _ptsAction = null; // {visitId, action, repName, oldPts}

// ══════════════════════════════════════════════════════════════
// SUPABASE HELPERS
// ══════════════════════════════════════════════════════════════
async function sbGet(table, params={}, opts={}){
  try{
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
    Object.entries(params).forEach(([k,v])=>url+=`&${k}=eq.${encodeURIComponent(v)}`);
    if(opts.order) url+=`&order=${opts.order}`;
    if(opts.filter) url+=`&${opts.filter}`;
    url+=`&limit=${opts.limit||1000}`;
    const r = await fetch(url,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
    return await r.json();
  }catch(e){return [];}
}

async function sbPatch(table, filter, data){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'},
      body: JSON.stringify(data)
    });
    return r.ok;
  }catch(e){return false;}
}

async function sbPost(table, data){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'},
      body: JSON.stringify(data)
    });
    return r.ok;
  }catch(e){return false;}
}

// ══════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════
async function loadSupervisors(){
  const data = await sbGet('users',{role:'supervisor'},{order:'name.asc',limit:100});
  SUPERVISORS = Array.isArray(data) ? data : [];
  const sel = document.getElementById('l-sup');
  sel.innerHTML = '<option value="">اختر اسمك...</option>';
  SUPERVISORS.forEach(s=>{
    const o = document.createElement('option');
    o.value = s.name;
    o.textContent = s.name;
    sel.appendChild(o);
  });
}

function onSupChange(){
  document.getElementById('l-err').style.display='none';
}

async function doLogin(){
  const name = document.getElementById('l-sup').value;
  const pass = document.getElementById('l-pass').value;
  const err  = document.getElementById('l-err');
  if(!name||!pass){err.style.display='block';err.textContent='اختر اسمك وأدخل الباسورد';return;}

  const sup = SUPERVISORS.find(s=>s.name===name);
  if(!sup || sup.pass_hash!==pass){err.style.display='block';err.textContent='اسم المشرف أو الباسورد غلط';return;}

  cu = {
    id: sup.id,
    name: sup.name,
    level: sup.level||'sup',
    groups: sup.groups ? sup.groups.split(',').map(g=>g.trim()) : [],
    pass: pass
  };

  document.getElementById('s-login').style.display='none';
  document.getElementById('s-app').style.display='flex';
  document.getElementById('top-sup-name').textContent = name + ' — ' + (cu.groups.map(g=>GROUPS[g]?.label||g).join('، '));

  // Set today's date in filters
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('v-date').value = today;
  document.getElementById('att-date').value = today;

  await loadAllData();
  showTab('dashboard');
}

function logout(){
  cu=null; cachedVisits=[]; cachedAttendance=[]; cachedLogs=[];
  document.getElementById('s-app').style.display='none';
  document.getElementById('s-login').style.display='flex';
  document.getElementById('l-pass').value='';
  document.getElementById('l-sup').value='';
}

// ══════════════════════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════════════════════
async function loadAllData(){
  document.getElementById('dash-loading').style.display='block';
  document.getElementById('dash-content').style.display='none';

  const grpFilter = cu.groups.map(g=>`grp=eq.${g}`).join('&');

  // جيب الزيارات لكل مجموعات المشرف
  cachedVisits = [];
  for(const grp of cu.groups){
    const v = await sbGet('visits',{grp},{order:'created_at.desc',limit:500});
    if(Array.isArray(v)) cachedVisits.push(...v);
  }
  cachedVisits.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  // جيب الحضور
  cachedAttendance = [];
  for(const grp of cu.groups){
    const a = await sbGet('attendance',{grp},{order:'created_at.desc',limit:200});
    if(Array.isArray(a)) cachedAttendance.push(...a);
  }

  // جيب السجلات الخاصة بالمشرف
  cachedLogs = await sbGet('point_logs',{supervisor_name:cu.name},{order:'created_at.desc',limit:100});
  if(!Array.isArray(cachedLogs)) cachedLogs=[];

  // بناء قايمة المنسقين
  repNames = [...new Set(cachedVisits.map(v=>v.name).filter(Boolean))].sort();
  const sel = document.getElementById('v-rep');
  sel.innerHTML = '<option value="all">كل المنسقين</option>';
  repNames.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});

  document.getElementById('dash-loading').style.display='none';
  document.getElementById('dash-content').style.display='block';

  renderDashboard();
  renderLeaderboard();
  renderVisits();
  renderAttendance();
  renderLogs();
  loadCurrentPlan();
}

async function refreshData(){
  await loadAllData();
}

// DASHBOARD
// ══════════════════════════════════════════════════════════════
function renderDashboard(){
  const today = new Date().toLocaleDateString('ar-EG');
  const todayStr = new Date().toISOString().slice(0,10);
  const todayV = cachedVisits.filter(v=>v.created_at?.startsWith(todayStr));
  const todayA = cachedAttendance.filter(a=>a.created_at?.startsWith(todayStr)||a.date===today);
  const totalPts = todayV.reduce((s,v)=>s+(+v.points||0),0);
  const checkedIn = todayA.filter(a=>a.time_in).length;
  const totalReps = repNames.length;

  document.getElementById('dash-stats').innerHTML=`
    <div class="stat"><div class="stat-n" style="color:#1565C0">${todayV.length}</div><div class="stat-l">زيارة اليوم</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--gold)">${totalPts}</div><div class="stat-l">نقاط اليوم</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${checkedIn}/${totalReps}</div><div class="stat-l">حضروا اليوم</div></div>
  `;

  // أداء كل مجموعة
  const maxPts = Math.max(...cu.groups.map(g=>todayV.filter(v=>v.grp===g).reduce((s,v)=>s+(+v.points||0),0)),1);
  document.getElementById('dash-perf').innerHTML = cu.groups.map(gid=>{
    const g = GROUPS[gid];
    const gv = todayV.filter(v=>v.grp===gid);
    const pts = gv.reduce((s,v)=>s+(+v.points||0),0);
    const pct = Math.round(pts/maxPts*100);
    return`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-weight:600">${g?.label||gid}</span>
        <span style="font-size:11px;color:var(--text2)">${gv.length} زيارة · ${pts} نقطة</span>
      </div>
      <div style="background:var(--border);border-radius:999px;height:8px;overflow:hidden">
        <div style="height:100%;border-radius:999px;background:${g?.color||'#ccc'};width:${pct}%;transition:width .5s"></div>
      </div>
    </div>`;
  }).join('');

  // آخر الأنشطة
  const recent = todayV.slice(0,8);
  document.getElementById('dash-activity').innerHTML = recent.length ? recent.map(v=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:50%;background:${GROUPS[v.grp]?.color||'#ccc'};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.name}</div>
        <div style="font-size:10px;color:var(--text2)">${v.branch||''}</div>
      </div>
      <span style="font-size:13px;font-weight:900;color:var(--navy)">${v.points||0}</span>
    </div>`).join('') : '<div class="empty">لا توجد زيارات اليوم</div>';
}

// ══════════════════════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════════════════════
function renderLeaderboard(){
  const period = document.getElementById('lb-period').value;
  const now = new Date();
  let filtered = cachedVisits;

  if(period==='today'){
    const todayStr = now.toISOString().slice(0,10);
    filtered = cachedVisits.filter(v=>v.created_at?.startsWith(todayStr));
  } else if(period==='week'){
    const weekAgo = new Date(now - 7*24*60*60*1000).toISOString();
    filtered = cachedVisits.filter(v=>v.created_at>=weekAgo);
  } else if(period==='month'){
    const monthAgo = new Date(now - 30*24*60*60*1000).toISOString();
    filtered = cachedVisits.filter(v=>v.created_at>=monthAgo);
  }

  // تجميع النقاط
  const scores = {};
  const visits_count = {};
  filtered.forEach(v=>{
    if(!v.name) return;
    scores[v.name]=(scores[v.name]||0)+(+v.points||0);
    visits_count[v.name]=(visits_count[v.name]||0)+1;
  });

  // ترتيب
  const sorted = repNames
    .map(n=>({name:n, pts:scores[n]||0, vc:visits_count[n]||0}))
    .sort((a,b)=>b.pts-a.pts);

  const maxPts = Math.max(...sorted.map(s=>s.pts), 1);

  if(!sorted.length){
    document.getElementById('lb-list').innerHTML='<div class="empty">لا توجد بيانات</div>';
    return;
  }

  const rankClass = i => i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
  const rankIcon  = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;

  document.getElementById('lb-list').innerHTML = sorted.map((r,i)=>`
    <div class="leader-item">
      <div class="leader-rank ${rankClass(i)}">${rankIcon(i)}</div>
      <div class="leader-info">
        <div class="leader-name">${r.name}</div>
        <div class="leader-route">${r.vc} زيارة</div>
        <div class="leader-bar-wrap">
          <div class="leader-bar" style="width:${Math.round(r.pts/maxPts*100)}%"></div>
        </div>
      </div>
      <div class="leader-pts">${r.pts} <span style="font-size:11px;color:var(--text2)">نقطة</span></div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════════════
// POINTS MANAGEMENT
// ══════════════════════════════════════════════════════════════
function openPtsModal(action, visitId, repName, oldPts){
  _ptsAction = {action, visitId, repName, oldPts};
  const isEdit = action==='edit';
  document.getElementById('modal-pts-title').textContent = isEdit?'تعديل النقاط':'حذف النقاط';
  document.getElementById('modal-pts-info').textContent = `${repName} — النقاط الحالية: ${oldPts}`;
  document.getElementById('modal-pts-val').style.display = isEdit?'block':'none';
  document.getElementById('modal-pts-val').value = oldPts;
  document.getElementById('modal-pts-reason').value = '';
  document.getElementById('modal-pts-err').style.display = 'none';
  const btn = document.getElementById('modal-pts-btn');
  btn.textContent = isEdit?'تأكيد التعديل':'تأكيد الحذف';
  btn.className = `btn-modal ${isEdit?'btn-confirm':'btn-confirm-red'}`;
  document.getElementById('modal-pts').classList.add('open');
}

function closePtsModal(){
  document.getElementById('modal-pts').classList.remove('open');
  _ptsAction = null;
}

async function confirmPtsAction(){
  if(!_ptsAction) return;
  const reason = document.getElementById('modal-pts-reason').value.trim();
  const err = document.getElementById('modal-pts-err');

  if(reason.length < 10){
    err.textContent = 'يجب كتابة سبب واضح (10 أحرف على الأقل)';
    err.style.display = 'block';
    return;
  }

  const {action, visitId, repName, oldPts} = _ptsAction;
  const newPts = action==='delete' ? 0 : parseInt(document.getElementById('modal-pts-val').value)||0;

  const btn = document.getElementById('modal-pts-btn');
  btn.disabled = true;
  btn.textContent = 'جاري الحفظ...';

  // 1. حدّث النقاط في visits
  const ok = await sbPatch('visits', `id=eq.${visitId}`, {
    points: newPts,
    adjusted_by: cu.name,
    adjusted_reason: reason
  });

  if(!ok){
    err.textContent = 'فشل الحفظ — تحقق من الاتصال';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = action==='edit'?'تأكيد التعديل':'تأكيد الحذف';
    return;
  }

  // 2. سجّل في point_logs
  await sbPost('point_logs', {
    supervisor_name: cu.name,
    rep_name: repName,
    grp: cu.groups[0]||'',
    action,
    visit_id: visitId,
    old_points: oldPts,
    new_points: newPts,
    reason
  });

  // 3. حدّث الـ cache المحلي
  const vIdx = cachedVisits.findIndex(v=>v.id==visitId);
  if(vIdx!==-1){
    cachedVisits[vIdx].points = newPts;
    cachedVisits[vIdx].adjusted_by = cu.name;
    cachedVisits[vIdx].adjusted_reason = reason;
  }

  // 4. إعادة تحميل السجلات
  cachedLogs = await sbGet('point_logs',{supervisor_name:cu.name},{order:'created_at.desc',limit:100});
  if(!Array.isArray(cachedLogs)) cachedLogs=[];

  closePtsModal();

  // 5. تحديث العرض
  renderVisits();
  renderLeaderboard();
  renderDashboard();
  renderLogs();

  // 6. إشعار نجاح
  showToast(action==='edit'?`✅ تم تعديل نقاط ${repName} إلى ${newPts}`:`✅ تم حذف نقاط ${repName}`);
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a2744;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-family:Cairo,sans-serif;z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw;text-align:center';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(()=>t.style.opacity='0', 3000);
}

// INIT
// ══════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════
// WEEKLY PLAN
// ══════════════════════════════════════════════════════════════
let currentPlan = null;
let planItems = [];
let _addingDay = null;

const DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

function getWeekDates(){
  const today = new Date();
  const day = today.getDay();
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - day);
  const dates = [];
  for(let i=0; i<7; i++){
    const d = new Date(sunday);
    d.setDate(sunday.getDate()+i);
    dates.push({
      name: DAYS[i],
      date: d.toISOString().slice(0,10),
      label: d.toLocaleDateString('ar-EG',{weekday:'long',month:'short',day:'numeric'})
    });
  }
  return dates;
}

async function loadCurrentPlan(){
  const weekStart = getWeekDates()[0].date;
  const data = await sbGet('weekly_plans',{supervisor_name:cu.name, week_start:weekStart});
  if(data && data.length){
    currentPlan = data[0];
    const items = await sbGet('weekly_plan_items',{plan_id:currentPlan.id},{order:'day_date.asc'});
    planItems = Array.isArray(items) ? items : [];
  } else {
    currentPlan = null;
    planItems = [];
  }
  renderPlan();
  loadExecutionStats();
}

function renderPlan(){
  const weekDates = getWeekDates();
  const statusBar = document.getElementById('plan-status-bar');
  const approveWrap = document.getElementById('plan-approve-wrap');

  if(!currentPlan){
    statusBar.innerHTML = '<span style="font-size:12px;color:var(--text2)">لا توجد خطة لهذا الأسبوع — أنشئ خطة جديدة</span>';
    document.getElementById('plan-days').innerHTML = '';
    approveWrap.style.display='none';
    return;
  }

  const statusClr = currentPlan.status==='approved'?'var(--green)':currentPlan.status==='closed'?'#888':'var(--orange)';
  const statusTxt = currentPlan.status==='approved'?'✅ معتمدة':currentPlan.status==='closed'?'🔒 مغلقة':'⏳ مسودة';
  statusBar.innerHTML = `<span style="font-size:12px;font-weight:600;color:${statusClr}">${statusTxt}</span>
    <span style="font-size:11px;color:var(--text2);margin-right:8px">${currentPlan.week_start} ← ${currentPlan.week_end}</span>`;

  // أيام الأسبوع
  document.getElementById('plan-days').innerHTML = weekDates.map(d=>{
    const dayItems = planItems.filter(i=>i.day_date===d.date);
    const isDone = dayItems.every(i=>i.status==='done');
    const hasItems = dayItems.length > 0;
    return`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <div style="font-size:13px;font-weight:700">${d.name}</div>
          <div style="font-size:11px;color:var(--text2)">${d.label}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${hasItems?`<span class="badge ${isDone?'b-green':'b-orange'}">${dayItems.filter(i=>i.status==='done').length}/${dayItems.length}</span>`:''}
          ${currentPlan.status!=='approved'?`<button onclick="openPlanItemModal('${d.date}','${d.name}')"
            style="background:var(--navy);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-family:Cairo,sans-serif;cursor:pointer">
            + زيارة</button>`:''}
        </div>
      </div>
      ${dayItems.length ? dayItems.map(item=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px;background:#f8f9fd;border-radius:8px;margin-bottom:4px">
          <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${item.status==='done'?'var(--green)':item.status==='missed'?'var(--red)':'#ddd'}"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600">${item.rep_name}</div>
            <div style="font-size:11px;color:var(--text2)">${item.branch_name}${item.target_goal?' · '+item.target_goal:''}</div>
          </div>
          <span class="badge ${item.status==='done'?'b-green':item.status==='missed'?'b-red':'b-gray'}">
            ${item.status==='done'?'✅ منجز':item.status==='missed'?'❌ فائت':'⏳ مجدول'}
          </span>
          ${currentPlan.status!=='approved'?`<button onclick="removePlanItem(${item.id})"
            style="background:#FFEBEE;color:var(--red);border:none;border-radius:4px;padding:3px 6px;font-size:10px;cursor:pointer">✕</button>`:''}
        </div>`).join('')
      : `<div style="font-size:11px;color:var(--text2);text-align:center;padding:8px">لا توجد زيارات مجدولة</div>`}
    </div>`;
  }).join('');

  // زر الاعتماد — بس لو مسودة وفيها زيارات
  approveWrap.style.display = (currentPlan.status==='draft' && planItems.length>0) ? 'block' : 'none';
}

async function createNewPlan(){
  if(currentPlan && currentPlan.status==='approved'){
    showToast('⚠️ الخطة الحالية معتمدة — لا يمكن إنشاء خطة جديدة');
    return;
  }
  const dates = getWeekDates();
  const weekStart = dates[0].date;
  const weekEnd   = dates[6].date;

  // لو في مسودة موجودة امسحها
  if(currentPlan){
    await fetch(`${SUPABASE_URL}/rest/v1/weekly_plans?id=eq.${currentPlan.id}`,{
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_plans`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=representation'},
    body: JSON.stringify({
      supervisor_name: cu.name,
      supervisor_grp: cu.groups[0]||'',
      week_start: weekStart,
      week_end: weekEnd,
      status:'draft'
    })
  });

  if(res.ok){
    const data = await res.json();
    currentPlan = Array.isArray(data) ? data[0] : data;
    planItems = [];
    renderPlan();
    showToast('✅ تم إنشاء خطة الأسبوع');
  }
}

async function approvePlan(){
  if(!currentPlan) return;
  if(planItems.length===0){ showToast('⚠️ أضف زيارات للخطة أولاً'); return; }

  await sbPatch('weekly_plans', `id=eq.${currentPlan.id}`, {
    status:'approved',
    approved_at: new Date().toISOString()
  });

  // إنشاء سجل التنفيذ
  await sbPost('supervisor_execution',{
    supervisor_name: cu.name,
    plan_id: currentPlan.id,
    week_start: currentPlan.week_start,
    total_planned: planItems.length,
    total_done: 0,
    execution_pts: 0
  });

  currentPlan.status = 'approved';
  renderPlan();
  showToast('✅ تم اعتماد خطة الأسبوع');
}

async function openPlanItemModal(date, dayName){
  if(!currentPlan){ showToast('أنشئ خطة أولاً'); return; }
  _addingDay = {date, dayName};
  document.getElementById('modal-plan-day').textContent = dayName + ' — ' + date;

  document.getElementById('pi-route').style.display='none';
  document.getElementById('pi-route').innerHTML='<option value="">اختر خط السير...</option>';
  document.getElementById('pi-branch').innerHTML='<option value="">اختر الفرع...</option>';
  document.getElementById('pi-goal').value = '';

  const repSel = document.getElementById('pi-rep');
  repSel.innerHTML = '<option value="">جاري التحميل...</option>';
  document.getElementById('modal-plan-item').classList.add('open');

  // جيب المنسقين من Supabase
  let allReps = [];
  console.log('cu.groups:', cu.groups);
  for(const grp of cu.groups){
    const url = `${SUPABASE_URL}/rest/v1/users?select=*&role=eq.rep&grp=eq.${encodeURIComponent(grp)}&limit=200`;
    console.log('fetching:', url);
    const res = await fetch(url,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
    const data = await res.json();
    console.log('reps for', grp, ':', data?.length||0);
    if(Array.isArray(data)) allReps.push(...data);
  }
  allReps.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));

  repSel.innerHTML = '<option value="">اختر المنسق...</option>';
  if(!allReps.length){
    repSel.innerHTML = '<option value="">لا يوجد منسقون في مجموعتك</option>';
  } else {
    allReps.forEach(r=>{
      const o=document.createElement('option');
      o.value=r.name;
      o.textContent=r.name;
      repSel.appendChild(o);
    });
  }
}

async function onPiRepChange(){
  const repName = document.getElementById('pi-rep').value;
  const routeSel = document.getElementById('pi-route');
  const branchSel = document.getElementById('pi-branch');

  routeSel.style.display='none';
  routeSel.innerHTML='<option value="">اختر خط السير...</option>';
  branchSel.innerHTML='<option value="">اختر الفرع...</option>';

  if(!repName) return;

  // جيب كل الفروع للمنسق من Supabase
  const data = await sbGet('branches',{rep_name:repName, status:'active'});
  if(!Array.isArray(data)||!data.length) return;

  // جمّع خطوط السير الفريدة
  const routes = [...new Set(data.map(b=>b.route).filter(Boolean))];

  if(routes.length > 1){
    // أكتر من خط سير — اعرض القايمة
    routeSel.style.display='block';
    routes.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;routeSel.appendChild(o);});
  } else {
    // خط سير واحد — اعرض الفروع مباشرة
    routeSel.style.display='none';
    data.forEach(b=>{const o=document.createElement('option');o.value=b.branch_name;o.textContent=b.branch_name;branchSel.appendChild(o);});
  }
}

async function onPiRouteChange(){
  const repName = document.getElementById('pi-rep').value;
  const route   = document.getElementById('pi-route').value;
  const branchSel = document.getElementById('pi-branch');
  branchSel.innerHTML='<option value="">اختر الفرع...</option>';
  if(!route) return;

  const data = await sbGet('branches',{rep_name:repName, route:route, status:'active'});
  if(Array.isArray(data)) data.forEach(b=>{
    const o=document.createElement('option');o.value=b.branch_name;o.textContent=b.branch_name;branchSel.appendChild(o);
  });
}

function closePlanItemModal(){
  document.getElementById('modal-plan-item').classList.remove('open');
  _addingDay = null;
}

async function addPlanItem(){
  const rep    = document.getElementById('pi-rep').value;
  const branch = document.getElementById('pi-branch').value;
  const goal   = document.getElementById('pi-goal').value.trim();
  if(!rep||!branch){ showToast('اختر المنسق والفرع'); return; }

  const grp = (await sbGet('users',{name:rep,role:'rep'}))?.[0]?.grp || cu.groups[0];

  const res = await fetch(`${SUPABASE_URL}/rest/v1/weekly_plan_items`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=representation'},
    body: JSON.stringify({
      plan_id: currentPlan.id,
      day_name: _addingDay.dayName,
      day_date: _addingDay.date,
      rep_name: rep,
      branch_name: branch,
      target_goal: goal,
      grp,
      status:'pending'
    })
  });

  if(res.ok){
    const item = (await res.json())[0];
    planItems.push(item);
    closePlanItemModal();
    renderPlan();
    showToast('✅ تمت إضافة الزيارة للخطة');
  }
}

async function removePlanItem(itemId){
  await fetch(`${SUPABASE_URL}/rest/v1/weekly_plan_items?id=eq.${itemId}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  planItems = planItems.filter(i=>i.id!==itemId);
  renderPlan();
}

// احتساب نقاط التنفيذ
async function calcExecutionPoints(){
  if(!currentPlan) return;

  const visits = cachedVisits;
  let done = 0;
  let checkinPts=0, shelfPts=0, missingPts=0, checkoutPts=0;

  for(const item of planItems){
    const match = visits.find(v=>
      v.name===item.rep_name &&
      v.branch===item.branch_name &&
      v.date===new Date(item.day_date).toLocaleDateString('ar-EG')
    );
    if(match){
      done++;
      if(match.att_in)    checkinPts  += 5;
      if(match.shelf)     shelfPts    += 10;
      if(match.missing)   missingPts  += 5;
      if(match.att_out)   checkoutPts += 5;

      // حدّث حالة البند
      if(item.status!=='done'){
        await sbPatch('weekly_plan_items',`id=eq.${item.id}`,{status:'done',visit_id:match.id});
        item.status = 'done';
      }
    }
  }

  const execPts = done*10 + checkinPts + shelfPts + missingPts + checkoutPts;

  await sbPatch('supervisor_execution',`plan_id=eq.${currentPlan.id}`,{
    total_done: done,
    execution_pts: execPts,
    checkin_pts: checkinPts,
    shelf_pts: shelfPts,
    missing_pts: missingPts,
    checkout_pts: checkoutPts,
    updated_at: new Date().toISOString()
  });

  return {done, total:planItems.length, execPts, checkinPts, shelfPts, missingPts, checkoutPts};
}

async function loadExecutionStats(){
  if(!currentPlan || currentPlan.status!=='approved'){
    document.getElementById('plan-execution').style.display='none';
    return;
  }
  const stats = await calcExecutionPoints();
  if(!stats) return;

  const pct = stats.total>0 ? Math.round(stats.done/stats.total*100) : 0;
  document.getElementById('plan-execution').style.display='block';
  document.getElementById('plan-exec-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:13px;font-weight:700">نسبة الإنجاز</span>
      <span style="font-size:20px;font-weight:900;color:${pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}">${pct}%</span>
    </div>
    <div style="background:var(--border);border-radius:999px;height:12px;overflow:hidden;margin-bottom:12px">
      <div style="height:100%;border-radius:999px;background:${pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)'};width:${pct}%;transition:width .5s"></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
      <div class="stat"><div class="stat-n" style="font-size:18px">${stats.done}/${stats.total}</div><div class="stat-l">زيارات منجزة</div></div>
      <div class="stat"><div class="stat-n" style="font-size:18px;color:var(--gold)">${stats.execPts}</div><div class="stat-l">نقاط التنفيذ</div></div>
      <div class="stat"><div class="stat-n" style="font-size:16px">${stats.checkinPts}</div><div class="stat-l">نقاط الحضور</div></div>
      <div class="stat"><div class="stat-n" style="font-size:16px">${stats.shelfPts}</div><div class="stat-l">نقاط الرف</div></div>
    </div>`;

  renderPlan();
}

window.addEventListener('DOMContentLoaded', ()=>{
  loadSupervisors();
});
