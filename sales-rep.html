<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>نظام مندوب مبيعات الطحان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Cairo,sans-serif;background:#EDE5D8;min-height:100vh;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;top:-120px;right:-120px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,#C55B4833 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-100px;left:-100px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,#C55B4822 0%,transparent 70%);pointer-events:none;z-index:0}

/* ── SCREENS ─────────────────────────────── */
.screen{display:none;position:relative;z-index:1;min-height:100vh}
.screen.active{display:flex}

/* ── LOGIN ───────────────────────────────── */
#screen-login{flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.container{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
.top-bar{width:60px;height:4px;background:#C55B48;border-radius:2px;margin-bottom:36px;opacity:.6}
.logo-wrap{margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.logo-wrap img{width:240px;object-fit:contain}
.app-title{font-size:18px;font-weight:700;color:#4B3220;letter-spacing:.5px;margin-bottom:6px;text-align:center}
.app-subtitle{font-size:12px;color:#C55B48;font-weight:600;margin-bottom:36px;text-align:center;letter-spacing:2px}
.login-card{width:100%;background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 8px 32px rgba(197,91,72,.10),0 2px 8px rgba(0,0,0,.05)}
.login-title{font-size:15px;font-weight:700;color:#4B3220;margin-bottom:20px;text-align:center}
.fld{margin-bottom:16px}
.lbl{display:block;font-size:12px;font-weight:600;color:#8B6A50;margin-bottom:6px}
.inp,.sel{width:100%;padding:12px 14px;border:1.5px solid #E0D4C8;border-radius:12px;font-family:Cairo,sans-serif;font-size:14px;color:#3a2a1a;background:#FDFAF7;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.inp:focus,.sel:focus{border-color:#C55B48;background:#fff}
.inp::placeholder{color:#C5B5A8}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8B6A50;pointer-events:none;font-size:16px}
.btn-login{width:100%;padding:14px;background:#C55B48;color:#fff;border:none;border-radius:12px;font-family:Cairo,sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .2s,transform .1s;box-shadow:0 4px 16px rgba(197,91,72,.25)}
.btn-login:active{transform:scale(.98)}
.btn-login:hover{background:#b54e3c}
.btn-login:disabled{background:#C5B5A8;cursor:not-allowed;box-shadow:none}
.err-msg{color:#C55B48;font-size:12px;font-weight:600;text-align:center;margin-top:12px;min-height:18px}
.footer{margin-top:24px;font-size:10px;color:#B0A090;text-align:center}
.bottom-bar{width:40px;height:3px;background:#C55B48;border-radius:2px;margin-top:20px;opacity:.4}

/* ── HOME ────────────────────────────────── */
#screen-home{flex-direction:column}
.home-wrap{width:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
.home-header{background:#fff;padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(197,91,72,.08);position:sticky;top:0;z-index:10}
.home-rep-info{display:flex;flex-direction:column;flex:1}
.home-rep-name{font-size:15px;font-weight:700;color:#3a2a1a}
.home-rep-date{font-size:11px;color:#8B6A50;margin-top:2px}
.home-logo{width:72px;object-fit:contain;margin:0 12px}
.btn-logout{background:none;border:1.5px solid #E0D4C8;border-radius:10px;padding:6px 12px;font-family:Cairo,sans-serif;font-size:12px;font-weight:600;color:#C55B48;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-logout:hover{background:#C55B48;color:#fff;border-color:#C55B48}
.home-body{padding:20px 16px;flex:1}
.home-section-title{font-size:13px;font-weight:700;color:#8B6A50;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.home-section-title::after{content:'';flex:1;height:1px;background:#E0D4C8}
.route-group{margin-bottom:24px}
.route-label{font-size:12px;font-weight:700;color:#C55B48;background:rgba(197,91,72,.08);padding:6px 14px;border-radius:8px;margin-bottom:10px;display:inline-block;border-right:3px solid #C55B48}
.branch-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.05);transition:transform .15s}
.branch-card:active{transform:scale(.99)}
.branch-info{flex:1;min-width:0}
.branch-name{font-size:14px;font-weight:700;color:#3a2a1a}
.branch-client{font-size:11px;color:#8B6A50;margin-top:3px}
.btn-invoice{background:#C55B48;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:Cairo,sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;flex-shrink:0;margin-right:12px}
.btn-invoice:hover{background:#b54e3c}
.home-loading{text-align:center;color:#8B6A50;font-size:14px;padding:40px 0}
.home-empty{text-align:center;color:#B0A090;font-size:14px;padding:40px 0}
</style>
</head>

async function sbGet(table, params) {

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function showError(msg) {
  document.getElementById('err-msg').textContent = msg;
  const btn = document.getElementById('btn-login');
  btn.disabled = false;
  btn.textContent = 'دخول';
}

function formatDate() {
  return new Date().toLocaleDateString('ar-EG', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

/* ── Load reps into dropdown ─────────────────────────── */
async function loadReps() {
  try {
    const reps = await sbGet('users', 'select=name&role=eq.sales&order=name');
    const sel = document.getElementById('rep-name');
    sel.innerHTML = '<option value="">— اختر اسمك —</option>';
    reps.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.name;
      opt.textContent = r.name;
      sel.appendChild(opt);
    });
  } catch(e) {
    document.getElementById('rep-name').innerHTML = '<option value="">خطأ في التحميل</option>';
    console.error('loadReps error:', e);
  }
}

/* ── Login ───────────────────────────────────────────── */
async function doLogin() {
  const name = document.getElementById('rep-name').value.trim();
  const pass = document.getElementById('rep-pass').value;
  document.getElementById('err-msg').textContent = '';

  if (!name) { showError('اختر اسمك من القائمة'); return; }
  if (!pass)  { showError('ادخل كلمة المرور'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'جاري التحقق...';

  try {
    const users = await sbGet('users',
      'select=*&role=eq.sales&name=eq.' + encodeURIComponent(name)
    );

    if (!users.length) { showError('المندوب غير موجود'); return; }

    const user = users[0];
    const hashed = await sha256(pass);
    const ok = (user.pass_hash === pass) || (user.pass_hash === hashed);

    if (!ok) { showError('كلمة المرور غلط'); return; }

    currentUser = user;
    btn.disabled = false;
    btn.textContent = 'دخول';

    document.getElementById('home-rep-name').textContent = user.name;
    document.getElementById('home-rep-date').textContent = formatDate();

    showScreen('home');
    loadBranches();

  } catch(e) {
    showError('خطأ في الاتصال — تحقق من الإنترنت');
    console.error('doLogin error:', e);
  }
}

/* ── Load branches ───────────────────────────────────── */
async function loadBranches() {
  const el = document.getElementById('branches-list');
  el.innerHTML = '<div class="home-loading">جاري تحميل الفروع...</div>';

  try {
    let params = 'select=route,branch_name&active=eq.true&order=route,branch_name';
    if (currentUser.grp)   params += '&grp=eq.'   + encodeURIComponent(currentUser.grp);
    if (currentUser.route) params += '&route=eq.' + encodeURIComponent(currentUser.route);

    const assignments = await sbGet('sales_route_assignments', params);

    if (!assignments.length) {
      el.innerHTML = '<div class="home-empty">لا توجد فروع مخصصة لك</div>';
      return;
    }

    /* Fetch client names */
    const names = assignments.map(a => '"' + a.branch_name.replace(/"/g, '\\"') + '"').join(',');
    let clientMap = {};
    try {
      const clients = await sbGet('branch_client_map',
        'select=branch_name,client_name&branch_name=in.(' + names + ')'
      );
      clients.forEach(c => clientMap[c.branch_name] = c.client_name);
    } catch(_) {}

    /* Group by route */
    const groups = {};
    assignments.forEach(a => {
      if (!groups[a.route]) groups[a.route] = [];
      groups[a.route].push(a.branch_name);
    });

    /* Render */
    let html = '';
    Object.entries(groups).forEach(([route, branches]) => {
      html += '<div class="route-group">'
           +  '<div class="route-label">📍 ' + route + '</div>';
      branches.forEach(b => {
        const client = clientMap[b] || '';
        html += '<div class="branch-card">'
             +    '<div class="branch-info">'
             +      '<div class="branch-name">' + b + '</div>'
             +      (client ? '<div class="branch-client">' + client + '</div>' : '')
             +    '</div>'
             +    '<button class="btn-invoice" onclick='openInvoice(' + JSON.stringify(b) + ',' + JSON.stringify(client) + ')'>فاتورة تسليم</button>'
             +  '</div>';
      });
      html += '</div>';
    });

    el.innerHTML = html;

  } catch(e) {
    el.innerHTML = '<div class="home-empty">خطأ في تحميل الفروع</div>';
    console.error('loadBranches error:', e);
  }
}

  alert('فاتورة تسليم\nالفرع: ' + branchName + (clientName ? '\nالعميل: ' + clientName : ''));

function doLogout() {
  currentUser = null;
  document.getElementById('rep-pass').value = '';
  document.getElementById('err-msg').textContent = '';
  showScreen('login');
}

/* ── Init ────────────────────────────────────────────── */
loadReps();
