<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الطحان — تطبيق المندوبين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --caramel:#C55B48;--caramel-dark:#A8432F;--caramel-light:#D97060;
    --sand:#EDE5D8;--sand-dark:#DDD0BC;--sand-deep:#C8B89A;
    --text-dark:#2C1A10;--text-mid:#5C3D2E;--text-light:#9C7B6A;
    --white:#FFFFFF;--red:#E53E3E;--green:#38A169;
  }
  html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;background:var(--sand)}

  .screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--sand);transition:opacity .25s ease,transform .25s ease;overflow:hidden}
  .screen.hidden{opacity:0;pointer-events:none;transform:translateX(30px)}

  /* LOGIN */
  #screen-login{justify-content:center;align-items:center;background:var(--sand)}
  .login-card{width:92%;max-width:380px;background:var(--white);border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(44,26,16,.15),0 4px 16px rgba(44,26,16,.08)}
  .login-top{background:var(--caramel);padding:40px 28px 32px;text-align:center;position:relative}
  .login-top::after{content:'';position:absolute;bottom:-16px;left:-10%;width:120%;height:32px;background:var(--caramel);border-radius:50%}
  .logo-box{width:210px;margin:0 auto 10px}
  .logo-box img{width:100%;height:auto;filter:brightness(0) invert(1);opacity:.95}
  .login-subtitle{color:rgba(255,255,255,.8);font-size:12px;font-weight:600;letter-spacing:.5px;margin-top:2px}
  .login-body{padding:40px 24px 28px;display:flex;flex-direction:column;gap:16px}
  .field-group{display:flex;flex-direction:column;gap:6px}
  .field-label{font-size:12px;font-weight:700;color:var(--text-mid)}
  .field-select,.field-input{width:100%;padding:13px 14px;background:var(--sand);border:1.5px solid var(--sand-dark);border-radius:12px;font-family:'Cairo',sans-serif;font-size:13px;color:var(--text-dark);outline:none;appearance:none;transition:border-color .15s}
  .field-select:focus,.field-input:focus{border-color:var(--caramel)}
  .select-wrap{position:relative}
  .select-wrap::after{content:'▾';position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--caramel);pointer-events:none;font-size:12px}
  .pass-wrap{position:relative}
  .pass-wrap .field-input{padding-left:40px}
  .pass-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-light);font-size:16px;line-height:1;padding:2px}
  .login-error{background:#FEE2E2;border:1px solid #FECACA;border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);font-weight:600;display:none}
  .login-error.show{display:block}
  .btn-primary{width:100%;background:var(--caramel);color:var(--white);border:none;border-radius:14px;padding:14px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(197,91,72,.30);transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary:hover{background:var(--caramel-dark)}
  .btn-primary:active{transform:scale(.98)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .login-footer{text-align:center;font-size:10px;color:var(--text-light);padding:0 24px 20px}
  .rep-type-badge{display:none;align-items:center;justify-content:center;gap:6px;background:rgba(197,91,72,.08);border:1.5px solid rgba(197,91,72,.2);border-radius:10px;padding:9px 14px;font-size:12px;font-weight:700;color:var(--caramel)}
  .rep-type-badge.show{display:flex}
  .rep-type-icon{font-size:16px}

  /* HOME */
  #screen-home{background:#F5EFE6}
  .home-header{background:var(--caramel);padding:20px 18px 56px;flex-shrink:0;position:relative}
  .home-header::after{content:'';position:absolute;bottom:-20px;left:-5%;width:110%;height:40px;background:var(--caramel);border-radius:50%}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start}
  .greeting{color:rgba(255,255,255,.75);font-size:11px;font-weight:500}
  .rep-name-display{color:white;font-size:17px;font-weight:800;margin-top:2px}
  .logout-btn{width:36px;height:36px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .stats-row{display:flex;gap:8px;margin-top:16px}
  .stat-pill{flex:1;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:10px 8px;text-align:center}
  .stat-num{color:white;font-size:20px;font-weight:900;line-height:1}
  .stat-lbl{color:rgba(255,255,255,.7);font-size:9px;font-weight:600;margin-top:3px}
  .home-body{flex:1;overflow-y:auto;padding:36px 14px 20px}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .section-title{font-size:13px;font-weight:800;color:var(--text-dark)}
  .section-badge{font-size:10px;font-weight:700;color:var(--caramel);background:rgba(197,91,72,.10);padding:3px 10px;border-radius:20px}
  .route-block{margin-bottom:20px}
  .route-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(197,91,72,.08);border-right:3px solid var(--caramel);border-radius:0 8px 8px 0;padding:5px 12px 5px 10px;font-size:11px;font-weight:800;color:var(--caramel);margin-bottom:9px}
  .branch-card{background:white;border-radius:16px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(44,26,16,.07);cursor:pointer;transition:transform .1s,box-shadow .1s;-webkit-tap-highlight-color:transparent}
  .branch-card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(44,26,16,.08)}
  .branch-icon{width:42px;height:42px;background:var(--sand);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .branch-info{flex:1;min-width:0}
  .branch-name{font-size:13px;font-weight:700;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .branch-client{font-size:11px;color:var(--text-light);margin-top:2px}
  .branch-arrow{width:28px;height:28px;background:var(--sand);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--caramel);font-size:11px;flex-shrink:0}
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;color:var(--text-light);font-size:13px}
  .spinner{width:32px;height:32px;border:3px solid var(--sand-dark);border-top-color:var(--caramel);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* BOTTOM NAV */
  .bottom-nav{background:white;border-top:1px solid var(--sand-dark);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);flex-shrink:0}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--text-light);font-size:9px;font-weight:600;transition:color .15s;-webkit-tap-highlight-color:transparent}
  .nav-item.active{color:var(--caramel)}
  .nav-icon{font-size:20px}

  /* TOAST */

  /* ===================== CLIENTS TAB ===================== */
  #screen-clients{background:#F5EFE6}
  .clients-header{background:var(--caramel);padding:18px 18px 54px;flex-shrink:0;position:relative}
  .clients-header::after{content:'';position:absolute;bottom:-20px;left:-5%;width:110%;height:40px;background:var(--caramel);border-radius:50%}
  .clients-header h2{color:white;font-size:16px;font-weight:800}
  .clients-body{flex:1;overflow-y:auto;padding:36px 14px 20px}

  /* Route selector */
  .route-select-wrap{position:relative;margin-bottom:16px}
  .route-select-wrap::after{content:'▾';position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--caramel);pointer-events:none;font-size:14px}
  .route-select{width:100%;padding:14px 16px;background:white;border:2px solid var(--sand-dark);border-radius:14px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;color:var(--text-dark);outline:none;appearance:none;transition:border-color .15s}
  .route-select:focus{border-color:var(--caramel)}

  /* ===================== VISIT SCREEN ===================== */
  #screen-visit{background:#F5EFE6}
  .visit-header{background:var(--caramel);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .back-btn{width:34px;height:34px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .visit-header-info{flex:1}
  .visit-header-title{color:white;font-size:14px;font-weight:800}
  .visit-header-sub{color:rgba(255,255,255,.75);font-size:10px;margin-top:2px}
  .visit-body{flex:1;overflow-y:auto;padding:16px 14px 20px;display:flex;flex-direction:column;gap:14px}

  /* Fea selector (الطحان / تمراتي) */
  .fea-row{display:flex;gap:8px}
  .fea-btn{flex:1;padding:12px 8px;border-radius:14px;border:2px solid var(--sand-dark);background:white;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;color:var(--text-mid);cursor:pointer;text-align:center;transition:all .15s}
  .fea-btn.active{border-color:var(--caramel);background:var(--caramel);color:white}

  /* Cat selector */
  .cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .cat-scroll::-webkit-scrollbar{display:none}
  .cat-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--sand-dark);background:white;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;color:var(--text-mid);cursor:pointer;white-space:nowrap;transition:all .15s}
  .cat-chip.active{border-color:var(--caramel);background:var(--caramel);color:white}

  /* Products list */
  .products-card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(44,26,16,.07)}
  .grp-header{padding:10px 14px;background:rgba(197,91,72,.06);border-bottom:1px solid rgba(197,91,72,.1);font-size:11px;font-weight:800;color:var(--caramel)}
  .product-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--sand);transition:background .1s}
  .product-row:last-child{border-bottom:none}
  .product-row:active{background:#FFF8F6}
  .prod-name{flex:1;font-size:12px;font-weight:600;color:var(--text-dark);line-height:1.4}
  .qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .qty-btn{width:28px;height:28px;background:var(--sand);border:none;border-radius:8px;font-size:16px;color:var(--caramel);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Cairo',sans-serif;transition:background .1s}
  .qty-btn:active{background:var(--sand-dark)}
  .qty-num{font-size:14px;font-weight:800;min-width:22px;text-align:center;color:var(--text-dark)}
  .qty-num.has-val{color:var(--caramel)}

  /* Submit bar */
  .submit-bar{background:white;border-top:1px solid var(--sand-dark);padding:12px 16px env(safe-area-inset-bottom,12px);flex-shrink:0;display:flex;align-items:center;gap:12px}
  .submit-summary{flex:1}
  .submit-items{font-size:11px;color:var(--text-light);font-weight:600}
  .submit-total{font-size:14px;font-weight:800;color:var(--text-dark)}
  .btn-submit{background:var(--caramel);color:white;border:none;border-radius:14px;padding:12px 20px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(197,91,72,.3);white-space:nowrap}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed}

  .section-label{font-size:11px;font-weight:800;color:var(--text-light);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-light);font-size:13px}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-dark);color:white;padding:10px 20px;border-radius:24px;font-size:12px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:9999}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

function getGreeting(){
  const h=new Date().getHours();
  if(h<12) return 'صباح الخير 👋';
  if(h<17) return 'مساء الخير 👋';
  return 'مساء النور 👋';
}

async function sbFetch(table, params=''){
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+table+params, {headers: SB_HEADERS});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

// ---- LOAD REPS ----
async function loadReps(){
  try{
    const data = await sbFetch('users','?role=eq.sales&select=id,name,grp,route,routes,rep_type&order=name');
    const sel=$('rep-select');
    data.forEach(r=>{
      const o=document.createElement('option');
      o.value=r.id; o.textContent=r.name;
      o.dataset.name=r.name; o.dataset.grp=r.grp||''; o.dataset.route=r.route||''; o.dataset.repType=r.rep_type||'';
      sel.appendChild(o);
    });
  }catch(e){ showToast('تعذّر تحميل قائمة المندوبين'); }
}

function onRepChange(){
  const sel=$('rep-select');
  const badge=$('rep-type-badge');
  const icon=$('rep-type-icon');
  const txt=$('rep-type-text');
  if(!sel.value){ badge.classList.remove('show'); return; }
  const opt=sel.options[sel.selectedIndex];
  const rt=opt.dataset.repType||'';
  if(rt==='سلاسل الطحان'){ icon.textContent='🏪'; txt.textContent='سلاسل الطحان'; }
  else if(rt==='أسواق خاصة'||rt==='اسواق خاصة'){ icon.textContent='🏬'; txt.textContent='أسواق خاصة'; }
  else if(rt){ icon.textContent='👤'; txt.textContent=rt; }
  else{ badge.classList.remove('show'); return; }
  badge.classList.add('show');
}

function togglePass(){
  const inp=$('pass-input');
  inp.type = inp.type==='password'?'text':'password';
}

// ---- LOGIN ----
async function doLogin(){
  const sel=$('rep-select');
  const passVal=$('pass-input').value.trim();
  const errEl=$('login-error');
  const btn=$('login-btn');
  errEl.classList.remove('show');
  if(!sel.value){ showToast('اختر اسمك أولاً'); return; }
  if(!passVal){ showToast('أدخل كلمة المرور'); return; }
  btn.disabled=true;
  btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div>';
  try{
    const data = await sbFetch('users','?id=eq.'+sel.value+'&role=eq.sales&select=id,name,grp,route,routes,branches,pass_hash,rep_type');
    if(!data.length) throw new Error('not found');
    const user=data[0];
    if(user.pass_hash !== passVal) throw new Error('wrong pass');
    // routes: use new 'routes' array if available, else fallback to single 'route'
    let repRoutes = [];
    if(user.routes && Array.isArray(user.routes) && user.routes.length){
      repRoutes = user.routes;
    } else if(user.route){
      repRoutes = [user.route];
    }
    currentRep={
      id: user.id,
      name: user.name,
      grp: user.grp,
      route: user.route,
      routes: repRoutes,
      branches: Array.isArray(user.branches) ? user.branches : [],
      repType: user.rep_type||''
    };
    await loadHomeScreen();
    showScreen('screen-home');
  }catch(e){
    errEl.classList.add('show');
  }finally{
    btn.disabled=false;
    btn.innerHTML='<span>دخول</span><span>←</span>';
  }
}

// ---- HOME ----
async function loadHomeScreen(){
  $('rep-name-display').textContent=currentRep.name;
  $('greeting-text').textContent=getGreeting();
  const container=$('branches-container');
  container.innerHTML='<div class="loading-state"><div class="spinner"></div><span>جاري تحميل الفروع...</span></div>';
  try{
    const rows = await sbFetch('sales_route_assignments',
      '?rep_name=eq.'+encodeURIComponent(currentRep.name)+'&active=eq.true&select=branch_name,grp,route&order=route,branch_name');
    let clientMap={};
    try{
      const bn=rows.map(r=>r.branch_name).filter(Boolean);
      if(bn.length){
        const cd=await sbFetch('branch_client_map','?branch_name=in.('+bn.map(b=>encodeURIComponent(b)).join(',')+')'+'&select=branch_name,client_name');
        cd.forEach(c=>{ clientMap[c.branch_name]=c.client_name; });
      }
    }catch(e){}
    const grouped={};
    rows.forEach(r=>{ const k=r.route||'غير محدد'; if(!grouped[k]) grouped[k]=[]; grouped[k].push(r); });
    const total=rows.length;
    $('stat-total').textContent=total;
    $('stat-remaining').textContent=total;
    $('stat-done').textContent=0;
    if(!total){
      container.innerHTML='<div class="loading-state"><span style="font-size:32px">📭</span><span>لا توجد فروع مسندة</span></div>';
      return;
    }
    const icons=['🏪','🏬','🏢','🛒','🏭'];
    let iconIdx=0;
    let html='<div class="section-header"><span class="section-title">فروعي اليوم</span><span class="section-badge">'+(currentRep.grp||'')+'</span></div>';
    Object.entries(grouped).forEach(([route,branches])=>{
      html+='<div class="route-block"><div class="route-tag">📍 '+route+'</div>';
      branches.forEach(b=>{
        const client=clientMap[b.branch_name]||'';
        const icon=icons[iconIdx++%icons.length];
        html+='<div class="branch-card" onclick="openBranch(\'' + b.branch_name.replace(/'/g,"\\'") + '\',\'' + client.replace(/'/g,"\\'") + '\')"><div class="branch-icon">'+icon+'</div><div class="branch-info"><div class="branch-name">'+b.branch_name+'</div><div class="branch-client">'+(client||'&mdash;')+'</div></div><div class="branch-arrow">◄</div></div>';
      });
      html+='</div>';
    });
    container.innerHTML=html;
  }catch(e){
    container.innerHTML='<div class="loading-state"><span style="font-size:32px">⚠️</span><span>تعذّر تحميل الفروع</span></div>';
  }
}

function openBranch(branchName, clientName){
  showToast('قريباً — شاشة فاتورة '+branchName);
}

function doLogout(){
  currentRep=null;
  $('rep-select').value='';
  $('pass-input').value='';
  $('login-error').classList.remove('show');
  showScreen('screen-login');
}

document.addEventListener('DOMContentLoaded',()=>{
  loadReps();
  showScreen('screen-login');
});

// ==================== GLOBALS ====================
let pdbData = null;       // full products_db pdb value
let branchesMap = null;   // branches_map value
let visitState = {
  branch: '', client: '',
  fea: null, cat: null,
  quantities: {}          // key: product name, value: qty
};

// ==================== TAB SWITCHING ====================
function switchTab(tab){
  // update nav active in both navbars
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.remove('active');
  });
  if(tab==='home'){
    showScreen('screen-home');
    document.querySelectorAll('.nav-item')[0].classList.add('active');
    document.querySelectorAll('.nav-item')[3]?.classList.add('active');
  } else if(tab==='clients'){
    showScreen('screen-clients');
    loadClientsTab();
    document.querySelectorAll('.nav-item')[1].classList.add('active');
    document.querySelectorAll('.nav-item')[4]?.classList.add('active');
  } else {
    showToast('قريباً');
  }
}

// ==================== LOAD PDB + BRANCHES_MAP ====================
async function loadPdb(){
  if(pdbData) return pdbData;
  const rows = await sbFetch('products_db','?key=eq.pdb&select=value&limit=1');
  let rawPdb = rows[0]?.value || {};
  pdbData = typeof rawPdb === 'string' ? JSON.parse(rawPdb) : rawPdb;
  return pdbData;
}

async function loadBranchesMap(){
  if(branchesMap) return branchesMap;
  const rows = await sbFetch('products_db','?key=eq.branches_map&select=value&limit=1');
  let raw = rows[0]?.value || {};
  // if value came as string, parse it
  branchesMap = typeof raw === 'string' ? JSON.parse(raw) : raw;
  return branchesMap;
}

// ==================== CLIENTS TAB ====================
async function loadClientsTab(){
  try{
    const isPrivate = currentRep.grp && currentRep.grp.startsWith('private');
    const repRoutes = currentRep.routes && currentRep.routes.length
      ? currentRep.routes
      : currentRep.route ? [currentRep.route] : [];

    if(!repRoutes.length){
      document.getElementById('route-select-wrap').style.display = 'none';
      document.getElementById('branches-list').innerHTML =
        '<div class="empty-state">⚠️ لم يتم تحديد خط سير — تواصل مع المشرف</div>';
      return;
    }

    if(repRoutes.length === 1){
      // one route — show branches directly
      document.getElementById('route-select-wrap').style.display = 'none';
      document.querySelector('#screen-clients .section-label').style.display = 'none';
      if(isPrivate){
        await showPrivateBranches(repRoutes[0]);
      } else {
        const map = await loadBranchesMap();
        await showBranchesForRoute(repRoutes[0], map[repRoutes[0]] || []);
      }
    } else {
      // multiple routes — show dropdown
      document.getElementById('route-select-wrap').style.display = 'block';
      document.querySelector('#screen-clients .section-label').style.display = 'block';
      const sel = document.getElementById('route-select');
      sel.innerHTML = '<option value="">— اختر خط السير —</option>';
      repRoutes.forEach(route=>{
        const o = document.createElement('option');
        o.value = route; o.textContent = route;
        sel.appendChild(o);
      });
      document.getElementById('branches-list').innerHTML = '';
      // store isPrivate for onRouteChange
      window._isPrivateRep = isPrivate;
      if(!isPrivate) await loadBranchesMap();
    }
  }catch(e){ showToast('تعذّر تحميل خطوط السير'); }
}

async function onRouteChange(){
  const sel = document.getElementById('route-select');
  const route = sel.value;
  if(!route){ document.getElementById('branches-list').innerHTML=''; return; }
  const isPrivate = window._isPrivateRep || (currentRep.grp && currentRep.grp.startsWith('private'));
  if(isPrivate){
    await showPrivateBranches(route);
  } else {
    const branches = (branchesMap && branchesMap[route]) || [];
    await showBranchesForRoute(route, branches);
  }
}

async function showPrivateBranches(route){
  const container = document.getElementById('branches-list');
  container.innerHTML='<div class="loading-state"><div class="spinner"></div><span>جاري تحميل الفروع...</span></div>';
  try{
    // fetch branches from branches table by route + grp
    const rows = await sbFetch('branches',
      '?route=eq.'+encodeURIComponent(route)+'&grp=eq.'+encodeURIComponent(currentRep.grp)+'&status=eq.active&select=branch_name,route&order=branch_name');
    const branches = rows.map(r=>r.branch_name).filter(Boolean);
    if(!branches.length){
      container.innerHTML='<div class="empty-state">لا توجد فروع في هذا الخط</div>';
      return;
    }
    await showBranchesForRoute(route, branches);
  }catch(e){
    container.innerHTML='<div class="empty-state">⚠️ تعذّر تحميل الفروع</div>';
  }
}

async function showBranchesForRoute(route, allBranches){
  const container = document.getElementById('branches-list');

  // لو خط ثابت → اعرض بس الفروع المختارة من currentRep.branches
  let branches = allBranches;
  if(route.startsWith('ثابت') && currentRep.branches && currentRep.branches.length){
    branches = allBranches.filter(b => currentRep.branches.includes(b));
  }

  if(!branches.length){
    container.innerHTML = '<div class="empty-state">لا توجد فروع مسندة في هذا الخط</div>';
    return;
  }
  container.innerHTML='<div class="loading-state"><div class="spinner"></div><span>جاري تحميل العملاء...</span></div>';
  try{
    const rows = await sbFetch('branch_client_map',
      '?branch_name=in.('+branches.map(b=>encodeURIComponent(b)).join(',')+')'+'&select=branch_name,client_name');
    const clientMap = {};
    rows.forEach(r=>{ clientMap[r.branch_name] = r.client_name; });
    const icons=['🏪','🏬','🏢','🛒','🏭'];
    let html = '<div class="route-block"><div class="route-tag">📍 '+route+'</div>';
    branches.forEach((b,i)=>{
      const icon = icons[i % icons.length];
      const client = clientMap[b] || '';
      const clientShort = client.length > 30 ? client.substring(0,30)+'...' : client;
      html += '<div class="branch-card" onclick="startVisit(\''+b.replace(/'/g,"\\'")+'\',\''+route.replace(/'/g,"\\'")+'\',\''+client.replace(/'/g,"\\'")+'\')"><div class="branch-icon">'+icon+'</div><div class="branch-info"><div class="branch-name">'+b+'</div><div class="branch-client">'+(clientShort||'—')+'</div></div><div class="branch-arrow">◄</div></div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }catch(e){
    const icons=['🏪','🏬','🏢','🛒','🏭'];
    let html = '<div class="route-block"><div class="route-tag">📍 '+route+'</div>';
    branches.forEach((b,i)=>{
      const icon = icons[i % icons.length];
      html += '<div class="branch-card" onclick="startVisit(\''+b.replace(/'/g,"\\'")+'\',\''+route.replace(/'/g,"\\'")+'\',\'\')"><div class="branch-icon">'+icon+'</div><div class="branch-info"><div class="branch-name">'+b+'</div><div class="branch-client">—</div></div><div class="branch-arrow">◄</div></div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }
}

// ==================== VISIT SCREEN ====================
async function startVisit(branchName, route, clientName){
  visitState = { branch: branchName, route: route, client: clientName||'', fea: null, cat: null, quantities: {}, discounts: {} };
  document.getElementById('visit-branch-name').textContent = branchName;
  document.getElementById('visit-client-name').textContent = clientName || route;
  // pre-load discounts for this client
  if(clientName){
    try{
      const disc = await sbFetch('client_category_discounts',
        '?client_name=eq.'+encodeURIComponent(clientName)+'&select=cat,discount_pct');
      disc.forEach(d=>{ visitState.discounts[d.cat] = d.discount_pct||0; });
    }catch(e){ /* no discounts */ }
  }
  document.getElementById('cat-section').style.display='none';
  document.getElementById('products-section').style.display='none';
  document.getElementById('submit-bar').style.display='none';

  // Build fea buttons
  try{
    const pdb = await loadPdb();
    const feas = Object.keys(pdb);
    const feaRow = document.getElementById('fea-row');
    feaRow.innerHTML = '';
    feas.forEach(fea=>{
      const btn = document.createElement('button');
      btn.className='fea-btn';
      btn.textContent = fea;
      btn.onclick = ()=>selectFea(fea, pdb);
      feaRow.appendChild(btn);
    });
  }catch(e){ showToast('تعذّر تحميل الأصناف'); }

  showScreen('screen-visit');
}

function selectFea(fea, pdb){
  visitState.fea = fea;
  visitState.cat = null;
  // update fea buttons
  document.querySelectorAll('.fea-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent===fea);
  });
  // build cat chips
  const cats = Object.keys(pdb[fea]||{});
  const catRow = document.getElementById('cat-row');
  catRow.innerHTML='';
  cats.forEach(cat=>{
    const chip = document.createElement('div');
    chip.className='cat-chip';
    chip.textContent=cat;
    chip.onclick=()=>selectCat(cat, pdb[fea][cat]);
    catRow.appendChild(chip);
  });
  document.getElementById('cat-section').style.display='block';
  document.getElementById('products-section').style.display='none';
  document.getElementById('submit-bar').style.display='none';
}

function selectCat(cat, grpData){
  visitState.cat = cat;
  // update cat chips
  document.querySelectorAll('.cat-chip').forEach(c=>{
    c.classList.toggle('active', c.textContent===cat);
  });
  // show discount for this cat
  const disc = visitState.discounts[cat] || 0;
  const discBadge = document.getElementById('disc-badge');
  if(discBadge){
    discBadge.textContent = disc > 0 ? 'خصم '+disc+'%' : 'بدون خصم';
    discBadge.style.color = disc > 0 ? 'var(--green)' : 'var(--text-light)';
  }
  // build products
  const container = document.getElementById('products-list');
  container.innerHTML='';
  const grps = Object.keys(grpData);
  grps.forEach(grp=>{
    const items = grpData[grp];
    if(!items || !items.length) return;
    const card = document.createElement('div');
    card.className='products-card';
    card.style.marginBottom='10px';
    let html = '<div class="grp-header">'+grp+'</div>';
    items.forEach(item=>{
      const qty = visitState.quantities[item.name]||0;
      html += '<div class="product-row"><div class="prod-name">'+item.name+'</div><div class="qty-ctrl"><button class="qty-btn" onclick="changeQty(\''+item.name.replace(/'/g,"\\'")+'\', -1)">−</button><span class="qty-num '+(qty>0?'has-val':'')+'" id="qty-'+item.name.replace(/[^a-zA-Z0-9]/g,'_')+'">'+qty+'</span><button class="qty-btn" onclick="changeQty(\''+item.name.replace(/'/g,"\\'")+'\', 1)">+</button></div></div>';
    });
    card.innerHTML = html;
    container.appendChild(card);
  });
  document.getElementById('products-section').style.display='block';
  updateSubmitBar();
}

function changeQty(name, delta){
  const current = visitState.quantities[name]||0;
  const newVal = Math.max(0, current+delta);
  if(newVal===0) delete visitState.quantities[name];
  else visitState.quantities[name] = newVal;
  // update display
  const key = name.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById('qty-'+key);
  if(el){
    el.textContent = newVal;
    el.classList.toggle('has-val', newVal>0);
  }
  updateSubmitBar();
}

function updateSubmitBar(){
  const entries = Object.entries(visitState.quantities).filter(([k,v])=>v>0);
  const totalItems = entries.reduce((s,[k,v])=>s+v,0);
  const bar = document.getElementById('submit-bar');
  if(totalItems>0){
    bar.style.display='flex';
    const disc = visitState.discounts[visitState.cat] || 0;
    document.getElementById('submit-items-txt').textContent = entries.length+' صنف / '+totalItems+' قطعة';
    document.getElementById('submit-total-txt').textContent = disc > 0 ? 'خصم '+disc+'% مطبّق' : 'بدون خصم';
    document.getElementById('btn-submit').disabled=false;
  } else {
    bar.style.display='none';
  }
}

async function submitVisit(){
  const entries = Object.entries(visitState.quantities).filter(([k,v])=>v>0);
  if(!entries.length){ showToast('لم تختر أي أصناف'); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent='جاري الحفظ...';
  try{
    const payload = {
      rep_name: currentRep.name,
      supervisor: currentRep.grp,
      branch_name: visitState.branch,
      client_name: visitState.client,
      grp: currentRep.grp,
      route: visitState.route,
      items: entries.map(([name,qty])=>({name, qty, discount_pct: visitState.discounts[visitState.cat]||0})),
      status: 'draft'
    };
    const res = await fetch(SUPABASE_URL+'/rest/v1/sales_deliveries', {
      method:'POST',
      headers:{...SB_HEADERS, 'Prefer':'return=minimal'},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error(await res.text());
    showToast('✓ تم حفظ الزيارة بنجاح');
    visitState.quantities={};
    setTimeout(()=>{ backFromVisit(); }, 1200);
  }catch(e){
    showToast('خطأ في الحفظ — حاول مرة أخرى');
    btn.disabled=false; btn.textContent='تأكيد الزيارة ✓';
  }
}

function backFromVisit(){
  showScreen('screen-clients');
  document.querySelectorAll('.nav-item').forEach((el,i)=>el.classList.toggle('active',i===1||i===4));
}

</script>
