<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ليدربورد منسق بلس | الطحان للتمور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#003049;
  --red:#D62828;
  --orange:#F77F00;
  --yellow:#FFC72C;
  --green:#1A7A4A;
  --blue:#005CBF;
  --purple:#6A0DAD;
  --gold:#FFD700;
  --silver:#C0C0C0;
  --bronze:#CD7F32;
}

body{
  font-family:'Cairo',sans-serif;
  background:#0A0E1A;
  color:#fff;
  min-height:100vh;
  overflow:hidden;
}

/* ── خلفية متحركة ─────────────────────────────────────────── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#0A0E1A 0%,#0D1B2A 40%,#0A1628 100%);
  overflow:hidden;
}
.bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 50%,rgba(0,48,73,.4) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 30%,rgba(214,40,40,.15) 0%,transparent 70%),
    radial-gradient(ellipse 40% 50% at 50% 80%,rgba(255,199,44,.08) 0%,transparent 70%);
}
.particles{position:absolute;inset:0;}
.particle{
  position:absolute;border-radius:50%;
  animation:float linear infinite;
  opacity:0;
}
@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0}
  10%{opacity:.6}
  90%{opacity:.3}
  100%{transform:translateY(-10vh) rotate(720deg);opacity:0}
}

/* ── Layout ───────────────────────────────────────────────── */
.wrapper{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:20px 30px;
  gap:16px;
}

/* ── Header ───────────────────────────────────────────────── */
.header{
  display:flex;align-items:center;gap:20px;
  padding:14px 24px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,199,44,.2);
  border-radius:16px;
  backdrop-filter:blur(10px);
}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:52px;height:52px;border-radius:12px;
  background:linear-gradient(135deg,var(--yellow),var(--orange));
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
  box-shadow:0 4px 15px rgba(255,199,44,.3);
}
.logo-text h1{font-size:22px;font-weight:900;color:var(--yellow);letter-spacing:.5px}
.logo-text p{font-size:12px;color:rgba(255,255,255,.5);margin-top:1px}
.header-center{flex:1;text-align:center}
.header-title{font-size:28px;font-weight:900;letter-spacing:1px;
  background:linear-gradient(90deg,#fff,var(--yellow),#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
.header-right{text-align:left;min-width:160px}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(26,122,74,.2);border:1px solid rgba(26,122,74,.4);
  border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;color:#4ADE80;
  margin-bottom:4px;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.live-dot{width:8px;height:8px;background:#4ADE80;border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
.update-time{font-size:11px;color:rgba(255,255,255,.35);display:block}

/* ── Stats Bar ────────────────────────────────────────────── */
.stats-bar{
  display:grid;grid-template-columns:repeat(5,1fr);gap:12px;
}
.stat-card{
  padding:12px 16px;border-radius:12px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  text-align:center;
  backdrop-filter:blur(5px);
  transition:transform .3s;
}
.stat-card:hover{transform:translateY(-2px)}
.stat-n{font-size:28px;font-weight:900;line-height:1}
.stat-l{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
.stat-card.blue  .stat-n{color:#60A5FA}
.stat-card.green .stat-n{color:#4ADE80}
.stat-card.yellow.stat-n,.stat-card.yellow .stat-n{color:var(--yellow)}
.stat-card.red   .stat-n{color:#F87171}
.stat-card.purple.stat-n,.stat-card.purple .stat-n{color:#C084FC}

/* ── Podium ───────────────────────────────────────────────── */
.podium-section{
  display:flex;align-items:flex-end;justify-content:center;
  gap:12px;padding:0 40px;
  flex-shrink:0;
}
.podium-item{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  flex:1;max-width:220px;
}
.pod-avatar{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:#fff;
  position:relative;flex-shrink:0;
  border:3px solid transparent;
}
.pod-1 .pod-avatar{width:72px;height:72px;font-size:24px;background:linear-gradient(135deg,#003049,#005CBF);border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,.4)}
.pod-2 .pod-avatar{width:60px;height:60px;background:linear-gradient(135deg,#1A2A1A,#1A7A4A);border-color:var(--silver);box-shadow:0 0 15px rgba(192,192,192,.3)}
.pod-3 .pod-avatar{width:54px;height:54px;background:linear-gradient(135deg,#2A1A0A,#CD7F32);border-color:var(--bronze);box-shadow:0 0 12px rgba(205,127,50,.3)}
.pod-crown{position:absolute;top:-14px;font-size:18px}
.pod-name{font-size:13px;font-weight:700;text-align:center;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-route{font-size:10px;color:rgba(255,255,255,.4);text-align:center;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-score{font-size:16px;font-weight:900}
.pod-1 .pod-score{color:var(--gold)}
.pod-2 .pod-score{color:var(--silver)}
.pod-3 .pod-score{color:var(--bronze)}
.pod-block{
  border-radius:8px 8px 0 0;width:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:rgba(255,255,255,.4);
}
.pod-1 .pod-block{height:70px;background:linear-gradient(180deg,rgba(255,215,0,.25),rgba(255,215,0,.08));border:1px solid rgba(255,215,0,.2);border-bottom:none;font-size:28px;color:var(--gold)}
.pod-2 .pod-block{height:52px;background:linear-gradient(180deg,rgba(192,192,192,.2),rgba(192,192,192,.05));border:1px solid rgba(192,192,192,.15);border-bottom:none;color:var(--silver)}
.pod-3 .pod-block{height:38px;background:linear-gradient(180deg,rgba(205,127,50,.2),rgba(205,127,50,.05));border:1px solid rgba(205,127,50,.15);border-bottom:none;color:var(--bronze)}

/* ── Main Content ─────────────────────────────────────────── */
.main-content{
  flex:1;display:grid;grid-template-columns:1fr 1fr;
  gap:16px;min-height:0;
}

/* ── Leaderboard List ─────────────────────────────────────── */
.lb-panel{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;
  overflow:hidden;
  display:flex;flex-direction:column;
}
.lb-panel-header{
  padding:12px 16px;
  background:rgba(255,255,255,.05);
  border-bottom:1px solid rgba(255,255,255,.07);
  font-size:13px;font-weight:700;color:rgba(255,255,255,.7);
  display:flex;align-items:center;gap:8px;
}
.lb-list{flex:1;overflow-y:auto;padding:8px}
.lb-list::-webkit-scrollbar{display:none}

.lb-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;
  margin-bottom:4px;
  transition:all .3s;
  border:1px solid transparent;
}
.lb-row:hover{background:rgba(255,255,255,.05)}
.lb-row.top1{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.15)}
.lb-row.top2{background:rgba(192,192,192,.06);border-color:rgba(192,192,192,.12)}
.lb-row.top3{background:rgba(205,127,50,.07);border-color:rgba(205,127,50,.12)}
.lb-row.me{background:rgba(0,92,191,.12);border-color:rgba(0,92,191,.25)}

.lb-rank{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.rank-1{background:rgba(255,215,0,.2);color:var(--gold)}
.rank-2{background:rgba(192,192,192,.15);color:var(--silver)}
.rank-3{background:rgba(205,127,50,.15);color:var(--bronze)}
.rank-n{background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);font-size:11px}

.lb-av{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-route{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-bar-wrap{width:70px;background:rgba(255,255,255,.08);border-radius:999px;height:5px;overflow:hidden;flex-shrink:0}
.lb-bar{height:100%;border-radius:999px;transition:width .8s ease}
.lb-pts{font-size:13px;font-weight:900;min-width:36px;text-align:left;flex-shrink:0}

/* ── Groups Panel ─────────────────────────────────────────── */
.groups-panel{
  display:flex;flex-direction:column;gap:10px;
}
.group-card{
  flex:1;padding:12px 16px;border-radius:14px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:12px;
  transition:all .3s;
}
.group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.group-info{flex:1;min-width:0}
.group-name{font-size:13px;font-weight:700;margin-bottom:3px}
.group-bar-wrap{background:rgba(255,255,255,.08);border-radius:999px;height:6px;overflow:hidden;margin-top:4px}
.group-bar{height:100%;border-radius:999px;transition:width 1s ease}
.group-stats{text-align:left;flex-shrink:0}
.group-pts{font-size:20px;font-weight:900}
.group-visits{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}

.gf-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);border-radius:999px;padding:4px 12px;
  font-size:11px;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .2s;
}
.gf-btn.active,.gf-btn:hover{
  background:rgba(255,199,44,.15);border-color:rgba(255,199,44,.4);
  color:#FFC72C;
}

/* ── Ticker ───────────────────────────────────────────────── */
.ticker{
  background:rgba(255,199,44,.08);
  border:1px solid rgba(255,199,44,.15);
  border-radius:10px;padding:8px 16px;
  display:flex;align-items:center;gap:12px;
  overflow:hidden;
}
.ticker-label{
  font-size:11px;font-weight:700;color:var(--yellow);
  white-space:nowrap;padding-left:12px;border-left:2px solid var(--yellow);flex-shrink:0;
}
.ticker-scroll{
  flex:1;overflow:hidden;position:relative;height:20px;
}
.ticker-text{
  position:absolute;white-space:nowrap;
  font-size:12px;color:rgba(255,255,255,.7);
  animation:scroll-ticker 30s linear infinite;
}
@keyframes scroll-ticker{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100vw)}
}

/* ── Animations ───────────────────────────────────────────── */
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,199,44,.2)}50%{box-shadow:0 0 25px rgba(255,199,44,.4)}}
.animate-in{animation:slideIn .5s ease forwards}
</style>
</head>
<body>

<div class="bg">
  <div class="particles" id="particles"></div>
</div>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">🏆</div>
      <div class="logo-text">
        <h1>منسق بلس</h1>
        <p>الطحان للتمور</p>
      </div>
    </div>
    <div class="header-center">
      <div class="header-title">ليدربورد المنسقين</div>
      <div class="header-sub" id="current-date"></div>
    </div>
    <div class="header-right">
      <div class="live-badge"><span class="live-dot"></span>مباشر</div>
      <span class="update-time" id="update-time">يتحدث كل دقيقة</span>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card blue"><div class="stat-n" id="s-reps">—</div><div class="stat-l">منسق نشط</div></div>
    <div class="stat-card green"><div class="stat-n" id="s-visits">—</div><div class="stat-l">زيارة اليوم</div></div>
    <div class="stat-card yellow"><div class="stat-n" id="s-pts">—</div><div class="stat-l">إجمالي النقاط</div></div>
    <div class="stat-card red"><div class="stat-n" id="s-missing">—</div><div class="stat-l">نواقص اليوم</div></div>
    <div class="stat-card purple"><div class="stat-n" id="s-online">—</div><div class="stat-l">متصل الآن</div></div>
  </div>

  <!-- Podium -->
  <div class="podium-section" id="podium"></div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Leaderboard List -->
    <div class="lb-panel">
      <div class="lb-panel-header">
        <span>🏅</span> ترتيب المنسقين
        <span style="margin-right:auto;font-size:10px;color:rgba(255,255,255,.3)" id="lb-count"></span>
      </div>
      <!-- فلتر المجموعة -->
      <div id="group-filter" style="display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.06)">
        <button class="gf-btn active" onclick="setFilter('all')" data-g="all">الكل</button>
        <button class="gf-btn" onclick="setFilter('giza')" data-g="giza">🔵 الجيزة</button>
        <button class="gf-btn" onclick="setFilter('cairo')" data-g="cairo">🟢 القاهرة</button>
        <button class="gf-btn" onclick="setFilter('south')" data-g="south">🔴 جنوب</button>
        <button class="gf-btn" onclick="setFilter('tajmuat')" data-g="tajmuat">🟡 التجمعات</button>
        <button class="gf-btn" onclick="setFilter('hyper')" data-g="hyper">🟣 الهايبر</button>
      </div>
      <div class="lb-list" id="lb-list"></div>
    </div>

    <!-- Groups -->
    <div class="groups-panel" id="groups-panel"></div>

  </div>

  <!-- Rep Details Modal -->
  <div id="rep-modal" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);align-items:center;justify-content:center">
    <div style="background:#0D1B2A;border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px;width:90%;max-width:420px;position:relative">
      <button onclick="closeRepModal()" style="position:absolute;top:12px;left:12px;background:rgba(255,255,255,.08);border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px">✕</button>
      <div id="rep-modal-content"></div>
    </div>
  </div>

  <!-- Ticker -->
  <div class="ticker">
    <div class="ticker-label">🔔 آخر الأخبار</div>
    <div class="ticker-scroll">
      <div class="ticker-text" id="ticker-text">جاري التحميل...</div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://tneeosrbxedexsrigapg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1MSr3avIfgV5chBV7gn2Pw_iqIrMFIp';
const REFRESH_MS   = 60 * 1000; // كل دقيقة

const GROUPS = {
  giza:    {label:'🔵 مجموعة الجيزة',      color:'#005CBF'},
  cairo:   {label:'🟢 وسط القاهرة',         color:'#1A7A4A'},
  south:   {label:'🔴 جنوب وشرق القاهرة',  color:'#D62828'},
  tajmuat: {label:'🟡 مجموعة التجمعات',    color:'#F77F00'},
  hyper:   {label:'🟣 الهايبر ماركت',       color:'#6A0DAD'},
};

const GRP_COLORS = ['#005CBF','#1A7A4A','#D62828','#F77F00','#6A0DAD'];

// ══════════════════════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════════════════════
async function sbSelect(table, params={}, opts={}){
  try{
    let url = `${SUPABASE_URL}/rest/v1/${table}?select=*`;
    Object.entries(params).forEach(([k,v])=>url+=`&${k}=eq.${encodeURIComponent(v)}`);
    if(opts.limit) url+=`&limit=${opts.limit}`;
    const res = await fetch(url,{headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
    return await res.json();
  }catch(e){ return []; }
}

// ══════════════════════════════════════════════════════════════
// DATA PROCESSING
// ══════════════════════════════════════════════════════════════
async function loadData(){
  const [visits, missing, locs, att] = await Promise.all([
    sbSelect('visits',     {}, {limit:2000}),
    sbSelect('missing',    {}, {limit:1000}),
    sbSelect('location',   {}, {limit:200}),
    sbSelect('attendance', {}, {limit:500}),
  ]);

  const today = new Date().toLocaleDateString('ar-EG');
  const todayVisits  = visits.filter(v=>v.date===today);
  const todayMissing = missing.filter(m=>m.created_at?.startsWith(new Date().toISOString().slice(0,10)));

  // حساب النقاط والزيارات لكل منسق
  const scores={}, visitCounts={}, meta={};
  visits.forEach(v=>{
    if(!v.name) return;
    scores[v.name]      = (scores[v.name]||0)      + (+v.points||0);
    visitCounts[v.name] = (visitCounts[v.name]||0) + 1;
    if(!meta[v.name]) meta[v.name]={route:v.route||'',group:v.grp||''};
  });

  const lb = Object.entries(scores)
    .map(([name,score])=>({name,score,visits:visitCounts[name],...meta[name]}))
    .sort((a,b)=>b.score-a.score);

  // أونلاين
  const TEN   = 10*60*1000, nowMs=Date.now();
  const online = locs.filter(l=>(nowMs-new Date(l.updated_at).getTime())<TEN).length;

  // إحصائيات المجموعات
  const groupStats={};
  Object.keys(GROUPS).forEach(g=>groupStats[g]={pts:0,visits:0,reps:new Set()});
  visits.forEach(v=>{
    if(!v.grp || !groupStats[v.grp]) return;
    groupStats[v.grp].pts  += +v.points||0;
    groupStats[v.grp].visits++;
    if(v.name) groupStats[v.grp].reps.add(v.name);
  });

  return {lb, todayVisits, todayMissing, online, groupStats, locs, visits, missing, att};
}

// ══════════════════════════════════════════════════════════════
// FILTER & REP DETAILS
// ══════════════════════════════════════════════════════════════
let currentFilter = 'all';
let cachedLB = [];
let cachedVisits = [];
let cachedMissing = [];
let cachedAtt = [];

function setFilter(grp){
  currentFilter = grp;
  document.querySelectorAll('.gf-btn').forEach(b=>b.classList.toggle('active', b.dataset.g===grp));
  renderList();
}

function renderList(){
  const filtered = currentFilter==='all' ? cachedLB : cachedLB.filter(r=>r.group===currentFilter);
  const max = filtered[0]?.score||1;
  document.getElementById('lb-count').textContent = filtered.length + ' منسق';
  document.getElementById('lb-list').innerHTML = filtered.map((r,i)=>{
    const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
    const rowCls  = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const gc      = GROUPS[r.group]?.color||'#005CBF';
    const ini     = r.name.split(' ').map(w=>w[0]).join('').slice(0,2);
    const pct     = Math.round(r.score/max*100);
    const medal   = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return `<div class="lb-row ${rowCls} animate-in" style="animation-delay:${i*.04}s;cursor:pointer" onclick="showRepDetails('${r.name.replace(/'/g,"\\'")}')">
      <div class="lb-rank ${rankCls}">${medal||i+1}</div>
      <div class="lb-av" style="background:${gc}33;color:${gc}">${ini}</div>
      <div class="lb-info">
        <div class="lb-name">${r.name}</div>
        <div class="lb-route">${r.route||''} · ${r.visits||0} زيارة</div>
      </div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${gc}"></div></div>
      <div class="lb-pts" style="color:${i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'rgba(255,255,255,.7)'}">${r.score}</div>
    </div>`;
  }).join('');
}

function showRepDetails(name){
  const rep = cachedLB.find(r=>r.name===name);
  if(!rep) return;
  const gc = GROUPS[rep.group]?.color||'#005CBF';
  const ini = rep.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  const rank = cachedLB.findIndex(r=>r.name===name)+1;

  // زيارات المنسق
  const repVisits = cachedVisits.filter(v=>v.name===name);
  const today = new Date().toLocaleDateString('ar-EG');
  const todayV = repVisits.filter(v=>v.date===today);

  // حضور
  const repAtt = cachedAtt.filter(a=>a.name===name);
  const lastAtt = repAtt[0];

  // نواقص
  const repMiss = cachedMissing.filter(m=>m.name===name);

  // آخر زيارة
  const lastVisit = repVisits[0];

  const modal = document.getElementById('rep-modal');
  document.getElementById('rep-modal-content').innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,${gc}88,${gc});display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;margin:0 auto 12px">${ini}</div>
      <div style="font-size:18px;font-weight:900;color:#fff">${rep.name}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">${rep.route||''}</div>
      <div style="display:inline-block;background:${gc}22;color:${gc};border-radius:999px;padding:3px 12px;font-size:11px;margin-top:6px">${GROUPS[rep.group]?.label||rep.group}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:900;color:${gc}">${rep.score}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.4)">نقطة</div>
      </div>
      <div style="background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:900;color:#FFC72C">${rep.visits||0}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.4)">زيارة</div>
      </div>
      <div style="background:rgba(255,255,255,.05);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:900;color:#D62828">${repMiss.length}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.4)">ناقص</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:10px">
        <span style="font-size:12px;color:rgba(255,255,255,.5)">الترتيب العام</span>
        <span style="font-size:14px;font-weight:700;color:#FFC72C">#${rank}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:10px">
        <span style="font-size:12px;color:rgba(255,255,255,.5)">زيارات اليوم</span>
        <span style="font-size:14px;font-weight:700;color:#1A7A4A">${todayV.length}</span>
      </div>
      ${lastVisit ? `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:10px">
        <span style="font-size:12px;color:rgba(255,255,255,.5)">آخر زيارة</span>
        <span style="font-size:12px;font-weight:600;color:#fff">${lastVisit.branch||''} — ${lastVisit.date||''}</span>
      </div>` : ''}
      ${lastAtt ? `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:10px">
        <span style="font-size:12px;color:rgba(255,255,255,.5)">الحضور</span>
        <span style="font-size:12px;font-weight:600;color:#fff">دخول ${lastAtt.time_in||''} — خروج ${lastAtt.time_out||'—'}</span>
      </div>` : ''}
    </div>
  `;
  modal.style.display='flex';
}

function closeRepModal(){
  document.getElementById('rep-modal').style.display='none';
}

// إغلاق بالضغط برا
document.getElementById('rep-modal').addEventListener('click', function(e){
  if(e.target===this) closeRepModal();
});


async function render(){
  const data = await loadData();
  const {lb, todayVisits, todayMissing, online, groupStats, visits, missing, att} = data;

  // حفظ البيانات في الكاش للاستخدام في التفاصيل والفلتر
  cachedLB = lb;
  cachedVisits = visits;
  cachedMissing = missing;
  cachedAtt = att;

  // ── Stats ──────────────────────────────────────────────────
  document.getElementById('s-reps').textContent    = lb.length;
  document.getElementById('s-visits').textContent  = todayVisits.length;
  document.getElementById('s-pts').textContent     = lb.reduce((s,r)=>s+r.score,0).toLocaleString('ar-EG');
  document.getElementById('s-missing').textContent = todayMissing.length;
  document.getElementById('s-online').textContent  = online;

  // ── Podium ─────────────────────────────────────────────────
  const top3  = lb.slice(0,3);
  const order = [top3[1], top3[0], top3[2]].filter(Boolean);
  const podPos= ['pod-2','pod-1','pod-3'];
  const crowns= ['','👑',''];
  const nums  = ['2','1','3'];

  document.getElementById('podium').innerHTML = order.map((r,i)=>{
    const ini = r.name.split(' ').map(w=>w[0]).join('').slice(0,2);
    const gc  = GROUPS[r.group]?.color||'#005CBF';
    const realIdx = order.indexOf(r)===1?0:order.indexOf(r)===0?1:2;
    return `<div class="podium-item ${podPos[i]}" style="cursor:pointer" onclick="showRepDetails('${r.name.replace(/'/g, '\\'')}')">
      <div class="pod-avatar" style="background:linear-gradient(135deg,${gc}88,${gc})">
        ${crowns[i]?`<span class="pod-crown">${crowns[i]}</span>`:''}
        ${ini}
      </div>
      <div class="pod-name">${r.name}</div>
      <div class="pod-route">${r.route||''}</div>
      <div class="pod-score">${r.score.toLocaleString('ar-EG')} نقطة</div>
      <div class="pod-block">${nums[i]}</div>
    </div>`;
  }).join('');

  // ── List ───────────────────────────────────────────────────
  renderList();

  // ── Groups ─────────────────────────────────────────────────
  const maxGrpPts = Math.max(...Object.values(groupStats).map(g=>g.pts),1);
  document.getElementById('groups-panel').innerHTML = Object.entries(GROUPS).map(([gid,g])=>{
    const gs  = groupStats[gid]||{pts:0,visits:0,reps:new Set()};
    const pct = Math.round(gs.pts/maxGrpPts*100);
    return `<div class="group-card" style="cursor:pointer" onclick="setFilter('${gid}')">
      <div class="group-dot" style="background:${g.color};box-shadow:0 0 8px ${g.color}66"></div>
      <div class="group-info">
        <div class="group-name" style="color:${g.color}">${g.label}</div>
        <div style="font-size:10px;color:rgba(255,255,255,.35)">${gs.reps.size} منسق · ${gs.visits} زيارة</div>
        <div class="group-bar-wrap"><div class="group-bar" style="width:${pct}%;background:${g.color}"></div></div>
      </div>
      <div class="group-stats">
        <div class="group-pts" style="color:${g.color}">${gs.pts.toLocaleString('ar-EG')}</div>
        <div class="group-visits">نقطة</div>
      </div>
    </div>`;
  }).join('');

  // ── Ticker ─────────────────────────────────────────────────
  const tickerItems = [
    ...lb.slice(0,3).map((r,i)=>['🥇🥈🥉'][0][i]||'🏅'+` المركز ${i+1}: ${r.name} بـ ${r.score} نقطة`),
    `📊 إجمالي الزيارات اليوم: ${todayVisits.length}`,
    `⚠️ النواقص اليوم: ${todayMissing.length}`,
    `📍 متصل الآن: ${online} منسق`,
    ...lb.slice(0,5).map(r=>`🏆 ${r.name} — ${r.score} نقطة`),
  ];
  document.getElementById('ticker-text').textContent = tickerItems.join('   •   ');

  // ── Update time ────────────────────────────────────────────
  document.getElementById('update-time').textContent =
    'آخر تحديث: '+new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════

// التاريخ
document.getElementById('current-date').textContent =
  new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// جزيئات الخلفية
(function(){
  const container = document.getElementById('particles');
  const colors    = ['#FFC72C','#D62828','#005CBF','#1A7A4A','#F77F00'];
  for(let i=0;i<25;i++){
    const el = document.createElement('div');
    el.className='particle';
    el.style.cssText=`
      left:${Math.random()*100}%;
      width:${Math.random()*4+2}px;
      height:${Math.random()*4+2}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${Math.random()*15+10}s;
      animation-delay:${Math.random()*10}s;
      opacity:.4;
    `;
    container.appendChild(el);
  }
})();

// أول تحميل
render();

// تحديث تلقائي كل دقيقة
setInterval(render, REFRESH_MS);

// تحديث التاريخ كل ثانية
setInterval(()=>{
  document.getElementById('current-date').textContent =
    new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
},1000);
</script>
