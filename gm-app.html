<!-- gm-app v1.0 — تطبيق المدير العام | إدارة المستخدمين -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>المدير العام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --brown:#4B3C1A; --caramel:#C55B48; --sand:#EDE5D8;
  --dark-red:#731E2E; --olive:#6B7A3B;
  --navy:#3D2E0F; --yellow:#E8A020; --green:#6B7A3B;
  --bg:#F5F0E8; --card:#FFFDF8; --border:#E8D9C0;
  --text:#2C1F0A; --text2:#8B6F47;
  /* نفس متغيرات لوحة التحكم (mansek-admin.html) عشان أي CSS منقول منها يشتغل صح */
  --red:#731E2E; --blue:#C55B48; --purple:#8B5A9A; --orange:#C55B48;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
input,select,textarea,button{font-family:inherit}

/* ══ Login ══ */
#login-screen{display:flex;min-height:100vh;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#2E2510 0%,#4B3C1A 50%,#3D3015 100%)}
.login-box{background:#FFFDF8;border:1px solid #E8D9C0;border-radius:20px;padding:2.5rem;width:360px;
  box-shadow:0 20px 60px rgba(75,60,26,.3)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo .icon{font-size:48px;color:var(--yellow)}
.login-logo h1{font-size:20px;font-weight:900;color:var(--navy);margin-top:6px}
.login-logo p{font-size:12px;color:var(--text2)}
.fld{margin-bottom:12px}
.lbl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;font-weight:600}
select,input[type=password],input[type=text],input[type=number]{
  width:100%;padding:9px 12px;border:1.5px solid #D4C4A8;border-radius:8px;font-size:13px;
  color:var(--text);background:#FFFDF8;transition:border-color .2s}
select:focus,input:focus{outline:none;border-color:#C55B48;box-shadow:0 0 0 3px rgba(197,91,72,.12)}
.err{background:#FFEBEE;color:#B71C1C;border-radius:6px;padding:8px 12px;font-size:12px;
  margin-bottom:10px;display:none}
.ok-msg{background:#E8F5E9;color:#1B5E20;border-radius:6px;padding:8px 12px;font-size:12px;
  margin-bottom:8px;display:none}

/* ══ Buttons ══ */
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all .18s;user-select:none}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:active{transform:scale(.96)!important;filter:brightness(.92)!important}
.btn-block{width:100%;justify-content:center}
.btn-primary{background:linear-gradient(135deg,#C55B48,#A8432E);color:#EDE5D8;
  box-shadow:0 3px 10px rgba(197,91,72,.35)}
.btn-green{background:linear-gradient(135deg,#6B7A3B,#4E5C28);color:#EDE5D8;
  box-shadow:0 3px 10px rgba(107,122,59,.35)}
.btn-red{background:linear-gradient(135deg,#731E2E,#5A1520);color:#EDE5D8}
.btn-ghost{background:transparent;border:1.5px solid #D4C4A8;color:#8B6F47}
.btn-ghost:hover{border-color:#C55B48;color:#C55B48;background:rgba(197,91,72,.06)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-xs{padding:4px 8px;font-size:10px;border-radius:6px}
.btn-navy{background:rgba(75,60,26,.8);color:#EDE5D8}

/* ══ App ══ */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:linear-gradient(135deg,#2E2510,#4B3C1A);padding:0 20px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:50}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand .icon{font-size:22px;color:var(--yellow)}
.topbar-brand h1{font-size:15px;font-weight:900;color:#EDE5D8}
.topbar-brand p{font-size:10px;color:#C8A870}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-user{display:flex;align-items:center;gap:8px;color:#EDE5D8;font-size:12px}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:var(--caramel);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}

/* ══ Tabs ══ */
.tabs-bar{background:#FFFDF8;border-bottom:2px solid var(--border);padding:0 20px;
  display:flex;gap:4px;overflow-x:auto}
.tab-btn{padding:12px 18px;border:none;background:none;font-family:Cairo,sans-serif;
  font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;
  border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;
  display:flex;align-items:center;gap:6px;transition:all .2s}
.tab-btn:hover{color:var(--caramel)}
.tab-btn.active{color:var(--caramel);border-bottom-color:var(--caramel)}

/* ══ Content ══ */
.content{padding:20px;max-width:1200px;margin:0 auto;width:100%}
.panel{display:none}
.panel.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-header h2{font-size:18px;font-weight:900;color:var(--navy);display:flex;
  align-items:center;gap:8px}
.page-header p{font-size:11px;color:var(--text2);margin-top:2px}

/* ══ Card / Table ══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  box-shadow:0 2px 8px rgba(75,60,26,.06)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:linear-gradient(135deg,#3D2E0F,#4B3C1A)}
th{padding:10px 12px;color:#EDE5D8;font-size:11px;font-weight:700;text-align:right;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(197,91,72,.04)}

/* ══ Badge ══ */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-green{background:#E8F5E9;color:#1B5E20}
.b-red{background:#FFEBEE;color:#B71C1C}
.b-blue{background:#E3F2FD;color:#1565C0}
.b-gray{background:#F5F5F5;color:#666}
.b-orange{background:#FFF3E0;color:#E65100}
.b-purple{background:#F3E5F5;color:#6A1B9A}

/* ══ Form ══ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-fld{margin-bottom:12px}
.form-lbl{font-size:11px;color:var(--text2);font-weight:700;display:block;margin-bottom:4px}
.form-sep{height:1px;background:var(--border);margin:16px 0}

/* ══ Modal ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#FFFDF8;border-radius:16px;padding:24px;width:min(480px,95vw);
  max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(75,60,26,.3);
  border:1px solid #E8D9C0}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);
  width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;
  padding-top:12px;border-top:1px solid var(--border)}

/* ══ Filter bar ══ */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid var(--border);
  border-radius:8px;font-family:Cairo,sans-serif;font-size:12px;background:#FFFDF8}

/* ══ Stats ══ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:900;color:var(--navy)}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:2px}
/* ══ عناصر منقولة من لوحة التحكم (Coord tabs) — نفس الأسماء بالظبط ══ */
.stat-n{font-size:28px;font-weight:900;line-height:1;margin-bottom:2px}
.stat-l{font-size:11px;color:var(--text2)}
.stat-card.blue .stat-n{color:var(--blue) !important}
.stat-card.green .stat-n{color:var(--green) !important}
.stat-card.red .stat-n{color:var(--red) !important}
.stat-card.orange .stat-n{color:var(--orange) !important}
.stat-card.purple .stat-n{color:var(--purple) !important}
.stat-card.yellow .stat-n{color:var(--yellow) !important}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px;
  display:flex;align-items:center;gap:6px}
.btn-blue{background:linear-gradient(135deg,#C55B48,#A8432E);color:#EDE5D8;
  box-shadow:0 3px 10px rgba(197,91,72,.35);border:none;border-radius:8px;cursor:pointer;
  font-family:Cairo,sans-serif}
.btn-blue:hover{background:linear-gradient(135deg,#D06B58,#C55B48);box-shadow:0 4px 14px rgba(197,91,72,.5)}
.btn-modal{padding:8px 18px;border-radius:8px;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-cancel{background:#F3F4F6;color:#374151}
.btn-cancel:hover{background:#E5E7EB}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

/* ══ Section header ══ */
.section-hdr{background:linear-gradient(135deg,#4B3C1A,#3D2E0F);color:#EDE5D8;
  font-size:11px;font-weight:700;padding:6px 12px}

/* ══ Toast ══ */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#2C1F0A;color:#EDE5D8;padding:10px 20px;border-radius:10px;font-size:13px;
  font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ══ Confirm overlay ══ */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  z-index:9999;display:flex;align-items:center;justify-content:center}

/* ══ Password toggle ══ */
.pass-wrap{position:relative}
.pass-wrap input{padding-left:36px}
.pass-toggle{position:absolute;left:8px;top:50%;transform:translateY(-50%);background:none;
  border:none;cursor:pointer;color:var(--text2);font-size:16px;padding:2px}

/* ══ Groups checkboxes ══ */
.grp-checks{display:flex;flex-wrap:wrap;gap:8px;padding:6px 0}
.grp-checks label{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer}
</style>
</head>
<body>

<!-- ══ Login ══════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏆</div>
      <h1>المدير العام</h1>
      <p>الطحان جولدن داتس | إدارة المستخدمين</p>
    </div>
    <div class="fld">
      <label class="lbl">كلمة المرور</label>
      <input type="password" id="l-pass" placeholder="أدخل الباسورد"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="err" id="l-err">❌ كلمة المرور غلط</div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">
      <i class="ti ti-login"></i> دخول
    </button>
    <p style="text-align:center;font-size:10px;color:var(--text2);margin-top:12px">v1.0 — GM App</p>
  </div>
</div>

<!-- ══ App ════════════════════════════════════════════════════════ -->
<div id="app" style="display:none;flex-direction:column;min-height:100vh">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <span class="icon">🏆</span>
      <div>
        <h1>لوحة المدير العام</h1>
        <p>الطحان جولدن داتس</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="topbar-avatar" id="tb-avatar">GM</div>
        <span id="tb-name">المدير العام</span>
      </div>
      <button class="btn btn-xs btn-ghost" onclick="doLogout()" style="color:#EDE5D8;border-color:rgba(255,255,255,.2)">
        <i class="ti ti-logout"></i> خروج
      </button>
    </div>
  </div>

  <!-- Sidebar mode switcher: مبيعات / تنسيق -->
  <div id="sidebar-mode-switcher" style="display:flex;gap:0;background:#FFFDF8;border-bottom:2px solid var(--border);padding:10px 20px 0">
    <button class="tab-btn sidebar-mode-btn active" id="mode-btn-coord" onclick="switchSidebarMode('coord')" style="border-bottom:3px solid var(--caramel);color:var(--caramel)">
      🧭 التنسيق
    </button>
    <button class="tab-btn sidebar-mode-btn" id="mode-btn-sales" onclick="switchSidebarMode('sales')">
      💰 المبيعات
    </button>
  </div>

  <!-- تابات التنسيق -->
  <div class="tabs-bar" id="coord-tabs-bar">
    <button class="tab-btn active" id="coord-tab-btn-location" onclick="showCoordTab('location')">
      📍 الموقع الحالي
    </button>
    <!-- تابات تنسيق تانية هتتضاف هنا تباعًا (داشبورد / المنسقون والمشرفون...) -->
  </div>

  <!-- تابات المبيعات -->
  <div class="tabs-bar" id="sales-tabs-bar" style="display:none">
    <button class="tab-btn active" id="sales-tab-btn-soon" onclick="">
      🛠️ قريبًا
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- ══ سيادبار التنسيق ══ -->
    <div id="screen-coord">
      <!-- ══ LOCATION — منقول حرفياً من لوحة التحكم ═══════════════════════════════════════ -->
      <div id="panel-location" class="panel active">
        <div class="stats-grid" id="loc-stats"></div>
        <div class="card">
          <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
            <span><i class="ti ti-map-pin" style="color:var(--green)"></i> الموقع الحالي</span>
            <button class="btn btn-sm" onclick="exportLocationPDF()" style="background:#B71C1C;color:#fff;display:flex;align-items:center;gap:5px">
              <i class="ti ti-file-type-pdf"></i> تصدير PDF
            </button>
          </div>
          <!-- فلاتر اللوكيشن -->
          <div class="filter-bar" style="flex-wrap:wrap;gap:8px;margin-bottom:8px">
            <select id="loc-filter-group" onchange="filterLocations()">
              <option value="all">كل المجموعات</option>
              <option value="giza">مجموعة الجيزة</option>
              <option value="cairo">وسط القاهرة</option>
              <option value="south">جنوب وشرق القاهرة</option>
              <option value="tajmuat">مجموعة التجمعات</option>
              <option value="hyper">الهايبر ماركت</option>
              <option value="alex">الإسكندرية</option>
              <option value="markets">الأسواق الخاصة</option>
              <option value="fuel_cairo">وقود القاهرة</option>
              <option value="fuel_alex">وقود الإسكندرية</option>
              <option value="private_cairo">أسواق خاصة القاهرة</option>
              <option value="private_alex">أسواق خاصة الإسكندرية</option>
            </select>
            <select id="loc-filter-status" onchange="filterLocations()">
              <option value="all">الكل</option>
              <option value="present">حضروا فقط</option>
              <option value="absent">لم يسجلوا حضور</option>
            </select>
            <!-- قائمة التاريخ -->
            <select id="loc-filter-date" onchange="locOnDateChange()" style="min-width:140px">
              <option value="today">اليوم</option>
              <option value="yesterday">أمس</option>
              <option value="2">قبل يومين</option>
              <option value="3">قبل 3 أيام</option>
              <option value="7">آخر 7 أيام</option>
              <option value="all" selected>الكل</option>
              <option value="custom">تاريخ محدد...</option>
            </select>
            <input type="date" id="loc-custom-date" style="display:none;width:140px" onchange="filterLocations()"/>
            <span id="loc-date-label" style="font-size:11px;color:var(--blue);font-weight:600;align-self:center"></span>
          </div>
          <!-- جدول اللوكيشن -->
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:32px"><input type="checkbox" id="loc-check-all" onchange="locToggleAll(this)" title="تحديد الكل"/></th>
                  <th>المنسق</th>
                  <th>المجموعة</th>
                  <th>خط السير</th>
                  <th>آخر فرع</th>
                  <th>لوكيشن حضور</th>
                  <th>لوكيشن انصراف</th>
                  <th>النشاط</th>
                  <th>الحالة</th>
                </tr>
              </thead>
              <tbody id="loc-table"></tbody>
            </table>
          </div>
          <!-- زرار تفاصيل -->
          <div id="loc-detail-bar" style="display:none;margin-top:10px;padding:10px;background:#EEF6FF;border-radius:8px;align-items:center;gap:10px">
            <span id="loc-selected-count" style="font-size:12px;color:var(--blue);font-weight:700"></span>
            <button class="btn btn-blue btn-sm" onclick="locOpenRepDetail()">
              <i class="ti ti-user-search"></i> عرض تفاصيل المنسق
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ سيادبار المبيعات ══ -->
    <div id="screen-sales" style="display:none">
      <div style="text-align:center;padding:80px 20px;color:var(--text2)">
        <div style="font-size:52px;margin-bottom:16px">🛠️</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px">تابات المبيعات قيد الإعداد</div>
        <div style="font-size:13px">هتتضاف قريبًا</div>
      </div>
    </div>
  </div><!-- end content -->
</div><!-- end app -->

<!-- ══ Toast ══ -->
<div id="toast"></div>

const H = () => ({'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'});

async function sbGet(table, params={}, opts={}){
  try{
    let url=`${SUPABASE_URL}/rest/v1/${table}?select=*`;
    Object.entries(params).forEach(([k,v])=>url+=`&${k}=eq.${encodeURIComponent(v)}`);
    if(opts.order) url+=`&order=${opts.order}`;
    url+=`&limit=${opts.limit||2000}`;
    const r=await fetch(url,{headers:H()});
    return r.ok?await r.json():[];
  }catch(e){return[];}
}

async function sbInsert(table,data){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
      method:'POST',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){return false;}
}

async function sbPatch(table,match,data){
  try{
    const q=Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${q}`,{
      method:'PATCH',headers:{...H(),'Prefer':'return=minimal'},body:JSON.stringify(data)});
    return r.ok;
  }catch(e){return false;}
}

async function sbDelete(table,match){
  try{
    const q=Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${q}`,{
      method:'DELETE',headers:H()});
    return r.ok;
  }catch(e){return false;}
}

function locGetDateRange(){
  const v = document.getElementById('loc-filter-date')?.value || 'all';
  const _d = new Date();
  const today = _d.getFullYear()+'-'+String(_d.getMonth()+1).padStart(2,'0')+'-'+String(_d.getDate()).padStart(2,'0');
  if(v==='today') return {single: today, label: 'اليوم — '+new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})};
  if(v==='yesterday'){
    const y = new Date(Date.now()-864e5).toISOString().slice(0,10);
    return {single: y, label: 'أمس — '+new Date(Date.now()-864e5).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})};
  }
  if(v==='custom'){
    const d = document.getElementById('loc-custom-date')?.value;
    return d ? {single: d, label: 'تاريخ محدد: '+d} : {single:null, label:''};
  }
  if(!isNaN(+v)){
    const from = new Date(Date.now()-(+v)*864e5).toISOString().slice(0,10);
    return {from, to: today, label: `آخر ${v} أيام`};
  }
  return {single:null, label:''};
}

// بناء map: اسم المنسق → آخر فرع زاره في التاريخ المطلوب
function buildAttendanceMap(range){
  // بترجع map: name => { hasIn, hasOut, branchIn, branchOut }
  const map = {};
  const att = cachedData.attendance||[];
  const noFilter = !range.single && !range.from;

  att.forEach(a=>{
    if(!a.name) return;
    const d = (a.date||'').slice(0,10);
    if(!d) return;
    if(!noFilter){
      if(range.single && d!==range.single) return;
      if(range.from && (d<range.from || d>range.to)) return;
    }
    // نأخذ آخر سجل في النطاق — نقارن بالـ id (تسلسلي وموثوق) مش created_at،
    // لأن created_at في جدول attendance اتضح إنه بيتغير أحياناً على سجلات قديمة
    // (بسبب عمليات تحديث/دمج سابقة)، فمش مضمون يعكس ترتيب الإدخال الحقيقي
    const ts = a.id || 0;
    if(!map[a.name] || ts > (map[a.name].ts||0)){
      map[a.name] = {
        date:   d,
        ts,
        hasIn:  !!a.time_in,   // يحكم بوقت الحضور مش GPS
        hasOut: !!a.time_out,  // يحكم بوقت الانصراف مش GPS
        timeIn:  a.time_in||'',
        timeOut: a.time_out||'',
        latIn:  a.lat_in,  lngIn:  a.lng_in,
        latOut: a.lat_out, lngOut: a.lng_out,
        hasGPSIn:  !!(a.lat_in  && a.lng_in),
        hasGPSOut: !!(a.lat_out && a.lng_out),
      };
    }
  });
  return map;
}

function buildLocBranchMap(range){
  const map = {};
  const visits = cachedData.visits||[];
  const noFilter = !range.single && !range.from;

  // 1. جيب الفروع من الزيارات للمتحركين
  visits.forEach(v=>{
    if(!v.name) return;
    if(!v.branch || v.branch === v.route) return;
    const d = (v.created_at||'').slice(0,10);
    if(!d) return;
    if(!noFilter){
      if(range.single && d!==range.single) return;
      if(range.from && d<range.from) return;
      if(range.to && d>range.to) return;
    }
    // قارن بالـ timestamp الكامل مش بس التاريخ — عشان لو المنسق زار أكتر من فرع في نفس اليوم
    const ts = v.created_at || '';
    if(!map[v.name] || ts > map[v.name].ts) map[v.name]={branch:v.branch, date:d, ts};
  });

  const res={};
  Object.entries(map).forEach(([k,o])=>res[k]=o.branch);

  // 2. للمنسقين الثابتين فعلاً بس (type==='ثابت' في جدول users) — جيب الفرع من branches عن طريق rep_name
  // مهم: منسق "متحرك" بيبقى rep_name ليه على كل فروع خط سيره (مش فرع واحد)، فلو طبّقنا الfallback ده
  // عليه هيثبت أول فرع أبجديًا وكأنه "فرعه الدائم" حتى لو مزارهوش خالص.
  const fixedRepNames = new Set((REPS||[]).filter(r=>r.type==='ثابت').map(r=>r.name));
  const branches = cachedData.branches||[];
  branches.forEach(b=>{
    if(b.rep_name && fixedRepNames.has(b.rep_name) && !res[b.rep_name]){
      res[b.rep_name] = b.branch_name;
    }
    if(b.rep_name2 && fixedRepNames.has(b.rep_name2) && !res[b.rep_name2]) res[b.rep_name2] = b.branch_name;
    if(b.rep_name3 && fixedRepNames.has(b.rep_name3) && !res[b.rep_name3]) res[b.rep_name3] = b.branch_name;
  });

  // 3. Fallback من coord_route_assignments — للمنسقين الثابتين بس برضه
  const coordAssign = cachedData.coord_route_assignments||[];
  coordAssign.forEach(c=>{
    if(c.rep_name && fixedRepNames.has(c.rep_name) && !res[c.rep_name]){
      res[c.rep_name] = c.branch_name;
    }
  });

  return res;
}

async function filterLocations(){
  const visible=CU.groups;
  const grp=document.getElementById('loc-filter-group')?.value||'all';
  const status=document.getElementById('loc-filter-status')?.value||'all';
  const range=locGetDateRange();

  const lbl=document.getElementById('loc-date-label');
  if(lbl) lbl.textContent=range.label?('📅 '+range.label):'';

  const branchMap=buildLocBranchMap(range);
  const attMap=buildAttendanceMap(range);

  const _locDow = range.single ? new Date(range.single).getDay() : null;
  const isScheduledOff = (r) => {
    if(_locDow===null) return false;
    const rdow = attDayNameToNum(r.day_off||'none');
    return rdow>=0 && rdow===_locDow;
  };

  const allVisibleReps = (REPS||[]).filter(r=>visible.includes(r.group||'') && r.status!=='inactive')
    .filter(r=>!isScheduledOff(r) || attMap[r.name]?.hasIn);
  const totalReps = allVisibleReps.length;
  const presentCount = allVisibleReps.filter(r=>attMap[r.name]?.hasIn).length;
  const absentCount = Math.max(totalReps-presentCount, 0);
  const attendancePct = totalReps ? Math.round(presentCount/totalReps*100) : 0;

  if(!window._locSupCache){
    try{
      const Hh = {'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};
      const sr = await fetch(`${SUPABASE_URL}/rest/v1/grp_supervisors?select=grp,supervisor`,{headers:Hh});
      window._locSupCache = sr.ok ? await sr.json().catch(()=>[]) : [];
    }catch(e){ window._locSupCache = []; }
  }
  const supByGroup = {};
  (window._locSupCache||[]).forEach(s=>{ if(s.grp) supByGroup[s.grp] = s.supervisor || '—'; });
  const supervisorOf = (r) => supByGroup[r.group] || '—';

  window._locCardsSnapshot = { reps: allVisibleReps, attMap, supervisorOf };

  const locStatCard = (bg, fg, num, label, filterKey) => `
    <div class="stat-card" style="background:${bg};border:none;cursor:pointer;text-align:center" onclick="locOpenStatModal('${filterKey}')">
      <div class="stat-n" style="color:${fg}">${num}</div>
      <div class="stat-l" style="color:${fg}">${label}</div>
    </div>`;
  const locStatsEl = document.getElementById('loc-stats');
  if(locStatsEl) locStatsEl.innerHTML =
    locStatCard('#F3E8FF','#7C3AED', totalReps,        'إجمالي المنسقين', 'all') +
    locStatCard('#DCFCE7','#16A34A', presentCount,      'حضروا',           'present') +
    locStatCard('#FFE4E0','#E8590C', absentCount,        'غائبون',          'absent') +
    locStatCard('#FEF3C7','#D97706', attendancePct+'%',  'نسبة الحضور',    'all');

  let reps = (REPS||[]).filter(r=>visible.includes(r.group||'') && r.status!=='inactive')
    .filter(r=>!isScheduledOff(r) || attMap[r.name]?.hasIn);
  if(grp!=='all') reps = reps.filter(r=>r.group===grp);
  if(status==='present') reps = reps.filter(r=>attMap[r.name]?.hasIn);
  if(status==='absent')  reps = reps.filter(r=>!attMap[r.name]?.hasIn);

  const inRange = (dateStr) => {
    if(!dateStr) return false;
    const d = dateStr.slice(0,10);
    if(range.single) return d===range.single;
    if(range.from)   return d>=range.from && d<=range.to;
    return true;
  };

  const countByName = (list) => {
    const map = {};
    (list||[]).forEach(x=>{
      if(!x.name || !inRange(x.created_at)) return;
      map[x.name] = (map[x.name]||0)+1;
    });
    return map;
  };
  const visitsCountByName   = countByName(cachedData.visits);
  const productsCountByName = countByName(cachedData.products);
  const missingCountByName  = countByName(cachedData.missing);

  const rangeKey = JSON.stringify(range);
  if(window._locReturnsRangeKey !== rangeKey){
    window._locReturnsRangeKey = rangeKey;
    try{
      const Hh = {'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};
      const r = await fetch(`${SUPABASE_URL}/rest/v1/returns?select=name,created_at&limit=5000`,{headers:Hh});
      window._locReturnsCache = r.ok ? await r.json().catch(()=>[]) : [];
    }catch(e){ window._locReturnsCache = []; }
  }
  const returnsCountByName = countByName(window._locReturnsCache);

  reps = [...reps].sort((a,b)=>{
    const ai = attMap[a.name]?.hasIn ? 1 : 0, bi = attMap[b.name]?.hasIn ? 1 : 0;
    if(ai!==bi) return bi-ai;
    return (a.name||'').localeCompare(b.name||'','ar');
  });

  const locTableEl = document.getElementById('loc-table');
  if(!locTableEl) return;
  locTableEl.innerHTML=reps.map(r=>{
    const gc=GROUPS[r.group]?.color||'#ccc';
    const branch=branchMap[r.name]||'';
    const branchHtml = branch
      ? `<span style="font-size:11px;background:#EEF6FF;color:#003A80;padding:2px 8px;border-radius:6px;font-weight:600">${branch}</span>`
      : `<span style="font-size:11px;color:#e53935;font-weight:600">لم يتم تسجيل فرع</span>`;

    const att = attMap[r.name];
    const inUrl  = att?.hasGPSIn  ? `https://maps.google.com/?q=${att.latIn},${att.lngIn}`  : null;
    const outUrl = att?.hasGPSOut ? `https://maps.google.com/?q=${att.latOut},${att.lngOut}` : null;

    const locInHtml = !att || !att.hasIn
      ? `<span style="color:#e53935;font-size:11px;font-weight:700">❌ لم يسجل</span>`
      : `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
          ${att.hasGPSIn
            ? `<a href="${inUrl}" target="_blank" style="color:#1A7A4A;font-weight:700;font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-map-pin"></i> عرض</a>`
            : `<span style="color:#888;font-size:10px">بدون GPS</span>`}
          <span style="font-size:10px;color:#888">${att.timeIn}</span>
        </div>`;

    const locOutHtml = !att || !att.hasIn
      ? `<span style="color:#aaa;font-size:11px">—</span>`
      : att.hasOut
        ? `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            ${att.hasGPSOut
              ? `<a href="${outUrl}" target="_blank" style="color:#993C1D;font-weight:700;font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-map-pin"></i> عرض</a>`
              : `<span style="color:#888;font-size:10px">بدون GPS</span>`}
            <span style="font-size:10px;color:#888">${att.timeOut}</span>
          </div>`
        : `<span style="color:#aaa;font-size:11px">لسه في الفرع</span>`;

    const vC=visitsCountByName[r.name]||0, pC=productsCountByName[r.name]||0,
          mC=missingCountByName[r.name]||0, rC=returnsCountByName[r.name]||0;
    const activityHtml = (vC||pC||mC||rC)
      ? `<div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:150px">
          ${vC?`<span style="background:#EEF6FF;color:#003A80;padding:1px 6px;border-radius:6px;font-size:10px">🏬 ${vC} زيارة</span>`:''}
          ${pC?`<span style="background:#F0FDF4;color:#166534;padding:1px 6px;border-radius:6px;font-size:10px">📦 ${pC} صنف</span>`:''}
          ${mC?`<span style="background:#FEF2F2;color:#991B1B;padding:1px 6px;border-radius:6px;font-size:10px">⚠️ ${mC} نقص</span>`:''}
          ${rC?`<span style="background:#FFF7ED;color:#9A3412;padding:1px 6px;border-radius:6px;font-size:10px">↩️ ${rC} مرتجع</span>`:''}
        </div>`
      : `<span style="color:#ccc;font-size:11px">—</span>`;

    let statusBadge;
    if(!att || !att.hasIn)  statusBadge = `<span class="badge b-gray">○ لم يسجل حضور</span>`;
    else if(!att.hasOut)    statusBadge = `<span class="badge b-green">● لسه في الفرع</span>`;
    else                    statusBadge = `<span class="badge" style="background:#EEF6FF;color:#003A80">○ انصرف</span>`;

    return`<tr>
      <td><input type="checkbox" class="loc-rep-cb" value="${r.name}" onchange="locOnCheckChange()"/></td>
      <td><b style="cursor:pointer;color:var(--blue)" onclick="locQuickDetail('${r.name.replace(/'/g,"&#39;")}')">${r.name}</b></td>
      <td><span class="badge" style="background:${gc}22;color:${gc}">${GROUPS[r.group]?.label||r.group||'—'}</span></td>
      <td style="font-size:11px">${r.route||'—'}</td>
      <td>${branchHtml}</td>
      <td style="text-align:center">${locInHtml}</td>
      <td style="text-align:center">${locOutHtml}</td>
      <td>${activityHtml}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="9" style="text-align:center;padding:1rem;color:var(--text2)">لا توجد بيانات للفترة المحددة</td></tr>';
}

function locOpenStatModal(filterKey){
  const snap = window._locCardsSnapshot;
  if(!snap) return;
  const { reps, attMap, supervisorOf } = snap;

  let list = reps;
  let title = 'كل المنسقين';
  if(filterKey==='present'){ list = reps.filter(r=>attMap[r.name]?.hasIn); title = 'المنسقون الحاضرون'; }
  else if(filterKey==='absent'){ list = reps.filter(r=>!attMap[r.name]?.hasIn); title = 'المنسقون الغائبون'; }

  list = [...list].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));

  let modal = document.getElementById('modal-loc-stat');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'modal-loc-stat';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
      <div class="modal" style="max-width:560px;max-height:80vh;display:flex;flex-direction:column">
        <div class="modal-title" id="loc-stat-modal-title" style="display:flex;align-items:center;justify-content:space-between">
          <span></span>
          <span id="loc-stat-modal-count" style="font-size:12px;color:var(--text2);font-weight:400"></span>
        </div>
        <div id="loc-stat-modal-body" style="overflow-y:auto;flex:1;margin-bottom:12px"></div>
        <div class="modal-btns">
          <button class="btn-modal btn-cancel" onclick="document.getElementById('modal-loc-stat').classList.remove('open')">إغلاق</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  document.getElementById('loc-stat-modal-title').querySelector('span').textContent = title;
  document.getElementById('loc-stat-modal-count').textContent = `${list.length} منسق`;

// تحويل اسم اليوم (عربي أو إنجليزي) لرقم (0=أحد ... 6=سبت)
function attDayNameToNum(name){
  if(!name) return -1;
  const map = {
    الأحد:0, الاثنين:1, الثلاثاء:2, الأربعاء:3, الخميس:4, الجمعة:5, السبت:6,
    sunday:0, monday:1, tuesday:2, wednesday:3, thursday:4, friday:5, saturday:6
  };
  return map[name]??map[name.toLowerCase()]??-1;
}

// المدير العام يشوف البانر دايماً بغض النظر عن استهداف عميل معين
// ══════════════════════════════════════════════════════════════
async function checkPromoBanner(){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/promo_banner?active=eq.true&select=*&order=id.asc`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}});
    if(!r.ok) return;
    const rows = await r.json();
    if(!rows.length) return;

    // المدير العام يشوف كل بانر نشط دايماً بغض النظر عن استهداف العملاء
    const seenMap = JSON.parse(localStorage.getItem('promo_banner_seen')||'{}');
    const relevant = rows.filter(row=>String(seenMap[row.id]) !== String(row.version));
    if(!relevant.length) return;
    window._pbQueue = relevant;
    pbShowNext();
  }catch(e){ console.warn('checkPromoBanner error:', e); }
}

function pbShowNext(){
  const row = (window._pbQueue||[]).shift();
  if(!row) return;
  window._pbCurrentBanner = row;

  const ov = document.createElement('div');
  ov.id = 'promo-banner-overlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;direction:rtl;padding:16px';
  ov.innerHTML = `<div style="background:#FBF7F0;border-radius:16px;max-width:400px;width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)">
    <div style="background:linear-gradient(135deg,#4B3C1A,#7C2D12);padding:14px 16px;display:flex;align-items:center;gap:10px">
      <i class="ti ti-speakerphone" style="font-size:20px;color:#EDE5D8"></i>
      <h3 style="color:#EDE5D8;font-size:14px;font-weight:700;flex:1;margin:0">${(row.title||'عرض جديد').replace(/</g,'&lt;')}</h3>
      <button onclick="closePromoBanner()" style="background:rgba(255,255,255,.15);border:none;color:#EDE5D8;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button>
    </div>
    <div style="overflow-y:auto;padding:16px;flex:1;font-size:13px;line-height:1.7;color:#2C1F0A;white-space:pre-wrap;font-family:Cairo,sans-serif">${(row.body||'').replace(/</g,'&lt;')}</div>
    <div style="padding:12px 14px;border-top:1px solid #E8D9C0">
      <button onclick="closePromoBanner()" style="width:100%;background:#4B3C1A;color:#EDE5D8;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:Cairo,sans-serif;cursor:pointer">
        <i class="ti ti-check"></i> تمام
      </button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function closePromoBanner(){
  const ov = document.getElementById('promo-banner-overlay');
  if(ov) ov.remove();
  const row = window._pbCurrentBanner;
  if(row){
    try{
      const seenMap = JSON.parse(localStorage.getItem('promo_banner_seen')||'{}');
      seenMap[row.id] = row.version;
      localStorage.setItem('promo_banner_seen', JSON.stringify(seenMap));
    }catch(e){}
  }
  setTimeout(pbShowNext, 400);
}

function buildGroupSelects(){
  const entries = Object.entries(GROUPS);

    const sel=document.getElementById(id);
    if(!sel) return;
    const hasAll = id==='rf-group'||id==='rt-group';

    entries.forEach(([k,v])=>{
      const o=document.createElement('option');

    });
  });
}

function buildGroupChecks(){
  ['ns-grp-checks','es-grp-checks'].forEach(id=>{

    el.innerHTML=Object.entries(GROUPS).map(([k,v])=>`

      <span>${v.label}</span></label>`).join('');

}

function renderReps(){
  const grp   = document.getElementById('rf-group')?.value||'all';
  const type  = document.getElementById('rf-type')?.value||'all';
  const status= document.getElementById('rf-status')?.value||'all';
  const search= (document.getElementById('rf-search')?.value||'').toLowerCase();

  let data=[...REPS];
  if(grp!=='all')    data=data.filter(r=>(r.grp||r.group)===grp);
  if(type!=='all')   data=data.filter(r=>(r.user_type||r.type)===type);
  if(status!=='all') data=data.filter(r=>(r.status||'active')===status);
  if(search)         data=data.filter(r=>r.name.toLowerCase().includes(search));

  if(!data.length){
    document.getElementById('reps-table').innerHTML=
      '<tr><td colspan="8" style="text-align:center;padding:2rem;color:#aaa">لا توجد نتائج</td></tr>';
    return;
  }
  document.getElementById('reps-table').innerHTML=data.map((r,i)=>{
    const grpKey=r.grp||r.group||'';
    const grpInfo=GROUPS[grpKey]||{label:grpKey,color:'#ccc'};
    const repType=r.user_type||r.type||'متحرك';
    const isActive=(r.status||'active')==='active';
    return `<tr style="${!isActive?'opacity:.55':''}">
      <td style="color:var(--text2)">${i+1}</td>
      <td><b>${r.name}</b></td>
      <td style="font-size:11px;color:var(--text2)">${r.route||'—'}</td>
      <td><span class="badge" style="background:${grpInfo.color}22;color:${grpInfo.color};font-size:10px">${grpInfo.label}</span></td>
      <td><span class="badge ${repType==='ثابت'?'b-purple':'b-blue'}">${repType}</span></td>
      <td><code style="background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:11px">${r.pass_hash||'—'}</code></td>
      <td>${isActive?'<span class="badge b-green">نشط</span>':'<span class="badge b-red">موقوف</span>'}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-xs" style="background:#E3F2FD;color:#1565C0" onclick="openEditRep(${i})" title="تعديل">
            <i class="ti ti-pencil"></i>
          </button>
          <button class="btn btn-xs" style="background:${isActive?'#FFF3E0':'#E8F5E9'};color:${isActive?'#E65100':'#1B5E20'}"
            onclick="toggleRep(${i})">${isActive?'إيقاف':'تفعيل'}</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function addRep(){
  const name=document.getElementById('nr-name').value.trim();
  const pass=document.getElementById('nr-pass').value.trim();
  const route=document.getElementById('nr-route').value.trim();
  const grp=document.getElementById('nr-group').value;
  const type=document.getElementById('nr-type').value;
  const msg=document.getElementById('nr-msg');
  if(!name||!pass){showFormMsg(msg,'❌ الاسم والباسورد مطلوبان','#B71C1C');return;}

  showFormMsg(msg,'⏳ جاري الإضافة...','#F77F00');
  const data={name,pass_hash:pass,role:'rep',route,grp,groups:grp,user_type:type,level:'rep',status:'active',goal:1};
  const ok=await sbInsert('users',data);
  if(ok){
    showToast('✅ تم إضافة '+name);
    closeModal('modal-add-rep');
    document.getElementById('nr-name').value='';
    document.getElementById('nr-pass').value='';
    document.getElementById('nr-route').value='';
    await loadReps();
  } else {
    showFormMsg(msg,'❌ خطأ في الإضافة — تحقق من الاتصال','#B71C1C');
  }
}

async function saveRep(){
  const id=document.getElementById('er-id').value;
  const oldName=document.getElementById('er-old-name').value;
  const name=document.getElementById('er-name').value.trim();
  const pass=document.getElementById('er-pass').value.trim();
  const route=document.getElementById('er-route').value.trim();
  const grp=document.getElementById('er-group').value;
  const type=document.getElementById('er-type').value;
  const status=document.getElementById('er-status').value;
  const msg=document.getElementById('er-msg');
  if(!name){showFormMsg(msg,'❌ الاسم مطلوب','#B71C1C');return;}

  showFormMsg(msg,'⏳ جاري الحفظ...','#F77F00');
  const data={name,pass_hash:pass,route,grp,groups:grp,user_type:type,status};
  const ok = id ? await sbPatch('users',{id},data) : await sbPatch('users',{name:oldName},data);
  if(ok){
    showToast('✅ تم تعديل '+name);
    closeModal('modal-edit-rep');
    await loadReps();
  } else {
    showFormMsg(msg,'❌ خطأ في الحفظ','#B71C1C');
  }
}

async function changeGMPass(){
  const current =document.getElementById('gm-pass-current').value.trim();
  const newPass =document.getElementById('gm-pass-new').value.trim();
  const confirm =document.getElementById('gm-pass-confirm').value.trim();
  const msg=document.getElementById('gm-pass-msg');

  if(!current||!newPass||!confirm){showFormMsg(msg,'❌ أكمل كل الحقول','#B71C1C');return;}
  if(newPass!==confirm){showFormMsg(msg,'❌ الباسورد الجديد مش متطابق','#B71C1C');return;}
  if(newPass.length<4){showFormMsg(msg,'❌ الباسورد لازم 4 أحرف على الأقل','#B71C1C');return;}

  let gmPass=localStorage.getItem('gm_pass_override')||GM_PASS_DEFAULT;
  try{
    const data=await sbGet('users',{name:'gm_admin',role:'gm'});
    if(data&&data[0]) gmPass=data[0].pass_hash||gmPass;
  }catch(e){}
  if(current!==gmPass){showFormMsg(msg,'❌ الباسورد الحالي غلط','#B71C1C');return;}

  showFormMsg(msg,'⏳ جاري الحفظ...','#F77F00');
  try{
    const existing=await sbGet('users',{name:'gm_admin',role:'gm'});
    if(existing&&existing[0]){
      await sbPatch('users',{name:'gm_admin'},{pass_hash:newPass});
    } else {
      await sbInsert('users',{name:'gm_admin',role:'gm',pass_hash:newPass,level:'gm',status:'active'});
    }
    localStorage.setItem('gm_pass_override',newPass);
    showFormMsg(msg,'✅ تم تغيير الباسورد بنجاح','#1A7A4A');
    document.getElementById('gm-pass-current').value='';
    document.getElementById('gm-pass-new').value='';
    document.getElementById('gm-pass-confirm').value='';
  }catch(e){showFormMsg(msg,'❌ خطأ: '+e.message,'#B71C1C');}
}

async function toggleUserByName(name,id,newStatus){
  const msg=document.getElementById('ts-msg');

                : await sbPatch('users',{name},{status:newStatus});

    showFormMsg(msg,`${newStatus==='active'?'✅ تم تفعيل':'🔴 تم إيقاف'} "${name}"`,
      newStatus==='active'?'#1A7A4A':'#B71C1C');
    _allUsersCache=[];
    searchUserForToggle();
    // تحديث محلي
    const ri=REPS.findIndex(r=>r.name===name);
    if(ri!==-1){REPS[ri].status=newStatus;renderReps();}
    const si=SUPS.findIndex(s=>s.name===name);

    showFormMsg(msg,'❌ خطأ في التغيير','#B71C1C');

// ROUTES — خطوط السير
// ══════════════════════════════════════════════════════════════
let ROUTES_DATA   = [];
let _branchCountMap = {};
let _repsMap        = {};

async function loadRoutesPanel(){
  document.getElementById('routes-table').innerHTML=
    '<tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa"><i class="ti ti-loader spin"></i> جاري التحميل...</td></tr>';

  const H2 = {'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};

  // خطوط السير
  const rtRes = await fetch(`${SUPABASE_URL}/rest/v1/routes?select=name,grp&order=name.asc`,{headers:H2});
  ROUTES_DATA = rtRes.ok ? await rtRes.json() : [];

  // الفروع — عدد لكل خط
  const brRes = await fetch(`${SUPABASE_URL}/rest/v1/branches?select=route,status&limit=5000`,{headers:H2});
  const brList = brRes.ok ? await brRes.json() : [];
  _branchCountMap={};
  brList.forEach(b=>{ const r=(b.route||'').trim(); if(r) _branchCountMap[r]=(_branchCountMap[r]||0)+1; });

  // المنسقون — ربط بالخط
  const repRes = await fetch(`${SUPABASE_URL}/rest/v1/users?select=name,route,status&role=eq.rep&limit=500`,{headers:H2});
  const repList = repRes.ok ? await repRes.json() : [];
  _repsMap={};
  repList.forEach(u=>{ const r=(u.route||'').trim(); if(!r)return; if(!_repsMap[r]) _repsMap[r]=[]; _repsMap[r].push(u); });

  document.getElementById('routes-count-lbl').textContent=`${ROUTES_DATA.length} خط سير`;
  renderRoutesStats();
  renderRoutes();
}

function renderRoutesStats(){
  const total=ROUTES_DATA.length;
  const withRep=ROUTES_DATA.filter(r=>(_repsMap[r.name]||[]).length>0).length;
  const totalBranches=Object.values(_branchCountMap).reduce((s,v)=>s+v,0);
  document.getElementById('routes-stats').innerHTML=`
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">إجمالي الخطوط</div></div>
    <div class="stat-card"><div class="num" style="color:#1A7A4A">${withRep}</div><div class="lbl">بها منسق</div></div>
    <div class="stat-card"><div class="num" style="color:#B71C1C">${total-withRep}</div><div class="lbl">بدون منسق</div></div>
    <div class="stat-card"><div class="num" style="color:#005CBF">${totalBranches}</div><div class="lbl">إجمالي الفروع</div></div>`;
}

function renderRoutes(){
  const grp   = document.getElementById('rt-group')?.value||'all';
  const search= (document.getElementById('rt-search')?.value||'').toLowerCase();

  let data=[...ROUTES_DATA];
  if(grp!=='all') data=data.filter(r=>r.grp===grp);
  if(search)      data=data.filter(r=>r.name.toLowerCase().includes(search));
  data.sort((a,b)=>(a.grp||'').localeCompare(b.grp||'')||a.name.localeCompare(b.name));

  if(!data.length){
    document.getElementById('routes-table').innerHTML=
      '<tr><td colspan="7" style="text-align:center;padding:2rem;color:#aaa">لا توجد نتائج</td></tr>';
    return;
  }

  document.getElementById('routes-table').innerHTML=data.map((r,i)=>{
    const grpInfo=GROUPS[r.grp]||{label:r.grp||'—',color:'#999'};
    const reps=_repsMap[r.name]||[];
    const activeReps=reps.filter(u=>u.status!=='inactive');
    const repNames=reps.map(u=>u.name).join('، ')||'<span style="color:#aaa">—</span>';
    const bCount=_branchCountMap[r.name]??'—';
    const isActive=reps.length>0;
    return `<tr>
      <td style="color:var(--text2)">${i+1}</td>
      <td><b style="cursor:pointer;color:var(--navy);text-decoration:underline dotted"
        onclick="openRouteDetailGM('${encodeURIComponent(r.name)}')">${r.name}</b></td>
      <td><span class="badge" style="background:${grpInfo.color}22;color:${grpInfo.color};font-size:10px">${grpInfo.label}</span></td>
      <td style="font-size:11px;max-width:180px">${repNames}</td>
      <td><span class="badge b-blue">${bCount} فرع</span></td>
      <td>${isActive?'<span class="badge b-green">نشط</span>':'<span class="badge b-gray">بدون منسق</span>'}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-xs" style="background:#E3F2FD;color:#1565C0"
            onclick="openRouteDetailGM('${encodeURIComponent(r.name)}')" title="تفاصيل">
            <i class="ti ti-eye"></i>
          </button>
          <button class="btn btn-xs btn-red"
            onclick="deleteRouteGM('${r.name.replace(/'/g,"\\'")}')">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function openRouteDetailGM(routeEncoded){
  const name=decodeURIComponent(routeEncoded);
  document.getElementById('rdt-title').textContent=name;
  document.getElementById('rdt-grp').textContent='...';
  document.getElementById('rdt-reps').textContent='...';
  document.getElementById('rdt-bcount').textContent='...';
  document.getElementById('rdt-branches').innerHTML=
    '<tr><td colspan="4" style="text-align:center;padding:1rem;color:#aaa"><i class="ti ti-loader spin"></i></td></tr>';
  openModal('modal-route-detail');

  const H2={'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};
  const rt=ROUTES_DATA.find(r=>r.name===name);
  const grpInfo=GROUPS[rt?.grp]||{label:rt?.grp||'—',color:'#999'};
  document.getElementById('rdt-grp').innerHTML=`<span style="color:${grpInfo.color}">${grpInfo.label}</span>`;

  const reps=_repsMap[name]||[];
  document.getElementById('rdt-reps').textContent=reps.map(r=>r.name).join('، ')||'—';

  // جيب الفروع
  const brRes=await fetch(`${SUPABASE_URL}/rest/v1/branches?select=branch_name,client_type,status&route=eq.${encodeURIComponent(name)}&order=branch_name.asc`,{headers:H2});
  const branches=brRes.ok?await brRes.json():[];
  document.getElementById('rdt-bcount').textContent=`${branches.length} فرع`;
  document.getElementById('rdt-branches').innerHTML=branches.length
    ? branches.map((b,i)=>`<tr>
        <td style="color:var(--text2)">${i+1}</td>
        <td>${b.branch_name||'—'}</td>
        <td>${b.client_type?`<span class="badge" style="background:${b.client_type==='A'?'#E8F5E9':'#FFF3E0'};color:${b.client_type==='A'?'#1A7A4A':'#E65100'}">${b.client_type}</span>`:'—'}</td>
        <td>${(b.status||'active')==='active'?'<span class="badge b-green">نشط</span>':'<span class="badge b-gray">موقوف</span>'}</td>
      </tr>`).join('')
    : '<tr><td colspan="4" style="text-align:center;padding:1rem;color:#aaa">لا توجد فروع</td></tr>';
}

async function addRouteGM(){
  const name=document.getElementById('art-name').value.trim();
  const grp=document.getElementById('art-group').value;
  const msg=document.getElementById('art-msg');
  if(!name){showFormMsg(msg,'❌ اسم خط السير مطلوب','#B71C1C');return;}
  showFormMsg(msg,'⏳ جاري الإضافة...','#F77F00');
  const ok=await sbInsert('routes',{name,grp});
  if(ok){
    showToast('✅ تم إضافة: '+name);
    closeModal('modal-add-route');
    document.getElementById('art-name').value='';
    await loadRoutesPanel();
  } else {
    showFormMsg(msg,'❌ خطأ — ربما الخط موجود مسبقاً','#B71C1C');
  }
}

async function deleteRouteGM(name){
  confirmAction(`حذف خط السير "${name}" نهائياً؟\n(الفروع المرتبطة به لن تُحذف)`, async ()=>{
    const ok=await sbDelete('routes',{name});
    if(ok){ showToast('🗑️ تم حذف: '+name); await loadRoutesPanel(); }
    else showToast('❌ خطأ في الحذف');
  });
}

// ══════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// أغلق الـ modal بالضغط خارجه
document.addEventListener('click',e=>{
  if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});

function showFormMsg(el,text,color){
  el.textContent=text; el.style.color=color; el.style.display='block';
  if(color==='#1A7A4A') setTimeout(()=>{el.style.display='none';},3000);
}

let _toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

function confirmAction(msg,cb){
  const ov=document.createElement('div');
  ov.className='confirm-overlay';
  ov.innerHTML=`
    <div style="background:#FFFDF8;border-radius:16px;padding:28px;width:340px;
      box-shadow:0 8px 32px rgba(75,60,26,.3);border:1px solid #E8D9C0;text-align:center">
      <div style="font-size:32px;margin-bottom:10px">⚠️</div>
      <p style="font-size:13px;font-weight:700;color:#2C1F0A;margin-bottom:16px">${msg}</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button id="ca-yes" style="padding:10px 24px;background:linear-gradient(135deg,#731E2E,#5A1520);
          color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
          font-family:Cairo,sans-serif">تأكيد</button>
        <button id="ca-no" style="padding:10px 24px;background:#F5F0E8;color:#4B3C1A;
          border:1.5px solid #D4C4A8;border-radius:8px;font-size:13px;cursor:pointer;
          font-family:Cairo,sans-serif">إلغاء</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#ca-yes').onclick=()=>{ov.remove();cb();};
  ov.querySelector('#ca-no').onclick=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
}

// ── Spin animation for loader
const style=document.createElement('style');
style.textContent=`@keyframes spin{to{transform:rotate(360deg)}}.spin{display:inline-block;animation:spin .8s linear infinite}`;
document.head.appendChild(style);

// البوب آب الأسبوعي التحفيزي — كل سبت من الساعة 8 صباحاً
// ══════════════════════════════════════════════════════════════
function checkWeeklyMotivationalPopup(){
  try{
    const now = new Date();
    if(now.getDay() !== 6 || now.getHours() < 8) return; // فقط السبت من الساعة 8

    // رقم الأسبوع ISO
    const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
    const dn = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dn);
    const ys = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const wn = Math.ceil((((d - ys) / 86400000) + 1) / 7);
    const wKey = 'weekly_popup_' + now.getFullYear() + '-W' + String(wn).padStart(2,'0');
    if(localStorage.getItem(wKey)) return;

      { v:'﴿ إِنَّ اللَّهَ لَا يُضِيعُ أَجْرَ الْمُحْسِنِينَ ﴾', r:'سورة التوبة: 120',

      { v:'﴿ وَقُلِ اعْمَلُوا فَسَيَرَى اللَّهُ عَمَلَكُمْ وَرَسُولُهُ وَالْمُؤْمِنُونَ ﴾', r:'سورة التوبة: 105',

      { v:'﴿ وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا • وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ ﴾', r:'سورة الطلاق: 2-3',
        t:'ابدأ أسبوعك بنية صادقة وعمل حقيقي. الرزق يأتي من طرق ما تتخيلها حين تصدق في عملك.' },
      { v:'﴿ وَالَّذِينَ جَاهَدُوا فِينَا لَنَهْدِيَنَّهُمْ سُبُلَنَا ﴾', r:'سورة العنكبوت: 69',
        t:'من يجتهد يجد طريقه. كل عميل صعب، كل خط سير شاق — هي درجة تصعد بها.' },
      { v:'﴿ فَامْشُوا فِي مَنَاكِبِهَا وَكُلُوا مِن رِّزْقِهِ ﴾', r:'سورة الملك: 15',
        t:'الأرض مذللة لمن يسعى. اخرج اليوم بثقة واسعَ في رزقك — الله وعد من يسعى.' },
      { v:'﴿ فَاسْتَبِقُوا الْخَيْرَاتِ ﴾', r:'سورة البقرة: 148',
        t:'التفوق لمن يبادر. لا تنتظر الفرصة — أنت نفسك الفرصة. سابق نفسك قبل أن تسابق غيرك.' },
      { v:'﴿ إِنَّ اللَّهَ لَا يُغَيِّرُ مَا بِقَوْمٍ حَتَّىٰ يُغَيِّرُوا مَا بِأَنفُسِهِمْ ﴾', r:'سورة الرعد: 11',
